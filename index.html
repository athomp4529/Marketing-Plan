document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"a74a678c-ef5a-45fd-9405-971175980242\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n  <style>/* Chick-fil-A brand typeface: Apercu (primary). */\n@font-face{font-family:\"Apercu\";src:url(\"79045054-a2c9-4768-9983-7bb75f4aa569\") format(\"opentype\");font-weight:400;font-style:normal;font-display:swap}\n@font-face{font-family:\"Apercu\";src:url(\"2dbd78bc-31ea-4dde-83c3-adda8297e0a7\") format(\"opentype\");font-weight:500;font-style:normal;font-display:swap}\n@font-face{font-family:\"Apercu\";src:url(\"5b3ccc33-581a-43e9-b5bb-38455877fa91\") format(\"opentype\");font-weight:700;font-style:normal;font-display:swap}\n<\u002Fstyle>\n  <style>/* ── Chick-fil-A Color System ──────────────────────────────────\n   Source of truth: Visual Identity Standards color swatches (RGB master).\n   Base palette = raw brand swatches. Semantic aliases follow below. */\n:root{\n  /* Primary */\n  --cfa-red:#DD0033;            /* PMS 186 C — the signature red */\n  --cfa-white:#FFFFFF;\n  --cfa-navy:#004F71;           /* PMS 3025 C */\n  --cfa-dark-red:#940929;       /* PMS 1955 C */\n\n  /* Neutrals */\n  --cfa-dark-gray:#5B6770;      /* PMS 431 C */\n  --cfa-gray:#DAD7D2;           /* PMS 2330 C */\n  --cfa-light-gray:#EEEDEB;     /* PMS Cool Gray 1 C */\n\n  /* Secondary — Blue family */\n  --cfa-blue:#3EB1C8;           /* PMS 631 C */\n  --cfa-light-blue:#A7CED8;     /* PMS 2204 C */\n\n  /* Secondary — Red / warm */\n  --cfa-bright-red:#FF1138;     /* PMS 185 C */\n  --cfa-orange:#E35205;         /* PMS 166 C */\n  --cfa-light-orange:#FA9370;   /* PMS 2023 C */\n  --cfa-pink:#F8C1B8;           /* PMS 2337 C */\n\n  /* Secondary — Green family */\n  --cfa-dark-green:#00635B;     /* PMS 7720 C */\n  --cfa-green:#249E6B;          /* PMS 2417 C */\n  --cfa-light-green:#B3CFAE;    /* PMS 2260 C */\n\n  /* Secondary — Yellow / cream */\n  --cfa-yellow:#FFB549;         /* PMS 1365 C */\n  --cfa-light-yellow:#F5E1A4;   /* PMS 7401 C */\n  --cfa-cream:#FCF7E7;          /* soft off-white background */\n\n  /* Secondary — Purple family */\n  --cfa-dark-purple:#5D3754;    /* PMS 7659 C */\n  --cfa-purple:#994878;         /* PMS 682 C */\n\n  /* ── Semantic aliases ── */\n  --color-brand:var(--cfa-red);\n  --color-brand-hover:var(--cfa-dark-red);\n  --color-brand-active:#7d0722;          /* darker than dark-red for press */\n\n  --text-primary:#1A1A1A;                /* near-black body text */\n  --text-secondary:var(--cfa-dark-gray);\n  --text-muted:#8A9299;                  /* lighter dark-gray */\n  --text-on-brand:var(--cfa-white);\n  --text-link:var(--cfa-red);\n  --text-link-hover:var(--cfa-dark-red);\n\n  --surface-page:var(--cfa-white);\n  --surface-cream:var(--cfa-cream);\n  --surface-card:var(--cfa-white);\n  --surface-subtle:var(--cfa-light-gray);\n  --surface-muted:var(--cfa-gray);\n  --surface-brand:var(--cfa-red);\n  --surface-navy:var(--cfa-navy);\n\n  --border-subtle:var(--cfa-light-gray);\n  --border-default:var(--cfa-gray);\n  --border-strong:var(--cfa-dark-gray);\n\n  --focus-ring:var(--cfa-blue);\n\n  --success:var(--cfa-green);\n  --info:var(--cfa-blue);\n  --warning:var(--cfa-yellow);\n  --danger:var(--cfa-red);\n}\n<\u002Fstyle>\n  <style>/* ── Chick-fil-A Typography ────────────────────────────────────\n   Apercu is the brand typeface across all applications. Apercu Bold\n   carries headlines; Medium for subheads/labels/buttons; Regular for body.\n   The Chick-fil-A script wordmark is a logo asset, never a font. */\n:root{\n  --font-sans:\"Apercu\",\"Helvetica Neue\",Arial,system-ui,sans-serif;\n  --font-body:var(--font-sans);\n  --font-display:var(--font-sans);\n  --font-mono:\"SFMono-Regular\",ui-monospace,Menlo,Consolas,monospace;\n\n  /* Weights */\n  --fw-regular:400; /* @kind font */\n  --fw-medium:500; /* @kind font */\n  --fw-bold:700; /* @kind font */\n\n  /* Type scale (1.250 major-third-ish, tuned) */\n  --fs-display:64px;\n  --fs-h1:48px;\n  --fs-h2:36px;\n  --fs-h3:28px;\n  --fs-h4:22px;\n  --fs-title:18px;\n  --fs-body:16px;\n  --fs-body-sm:14px;\n  --fs-caption:13px;\n  --fs-label:12px;\n\n  /* Line heights */\n  --lh-tight:1.05; /* @kind font */\n  --lh-heading:1.15; /* @kind font */\n  --lh-snug:1.35; /* @kind font */\n  --lh-body:1.55; /* @kind font */\n\n  /* Letter spacing */\n  --ls-tight:-0.02em; /* @kind font */\n  --ls-normal:0; /* @kind font */\n  --ls-label:0.08em;    /* uppercase labels/eyebrows @kind font */\n  --ls-wide:0.14em;     /* FT. TOTTEN-style locator caps @kind font */\n}\n<\u002Fstyle>\n  <style>/* ── Spacing, radii, layout ──────────────────────────────────── */\n:root{\n  /* 4px base scale */\n  --space-0:0;\n  --space-1:4px;\n  --space-2:8px;\n  --space-3:12px;\n  --space-4:16px;\n  --space-5:20px;\n  --space-6:24px;\n  --space-8:32px;\n  --space-10:40px;\n  --space-12:48px;\n  --space-16:64px;\n  --space-20:80px;\n  --space-24:96px;\n\n  /* Radii — CFA leans soft & friendly; pills for buttons/chips */\n  --radius-sm:6px;\n  --radius-md:10px;\n  --radius-lg:16px;\n  --radius-xl:24px;\n  --radius-pill:999px;\n  --radius-circle:50%;\n\n  /* Container widths */\n  --container-sm:640px;\n  --container-md:960px;\n  --container-lg:1200px;\n  --container-xl:1440px;\n}\n<\u002Fstyle>\n  <style>/* ── Elevation, shadow, motion ─────────────────────────────────\n   CFA digital surfaces use soft, low-contrast shadows and gentle,\n   quick easing. No harsh drop shadows; nothing bouncy or flashy. */\n:root{\n  --shadow-xs:0 1px 2px rgba(26,26,26,.06);\n  --shadow-sm:0 1px 3px rgba(26,26,26,.08),0 1px 2px rgba(26,26,26,.05);\n  --shadow-md:0 4px 12px rgba(26,26,26,.08);\n  --shadow-lg:0 10px 28px rgba(26,26,26,.10);\n  --shadow-xl:0 20px 48px rgba(26,26,26,.12);\n  --shadow-brand:0 8px 20px rgba(221,0,51,.24);\n\n  /* Motion */\n  --ease-standard:cubic-bezier(.4,0,.2,1); /* @kind other */\n  --ease-out:cubic-bezier(0,0,.2,1); /* @kind other */\n  --ease-in:cubic-bezier(.4,0,1,1); /* @kind other */\n  --dur-fast:120ms; /* @kind other */\n  --dur-base:200ms; /* @kind other */\n  --dur-slow:320ms; /* @kind other */\n\n  /* Focus */\n  --focus-width:3px; /* @kind other */\n  --focus-offset:2px; /* @kind other */\n}\n<\u002Fstyle>\n  <style>/* ── Base element styling (opt-in reset + brand defaults) ────── */\n*,*::before,*::after{box-sizing:border-box}\nbody{\n  margin:0;\n  font-family:var(--font-body);\n  font-size:var(--fs-body);\n  line-height:var(--lh-body);\n  font-weight:var(--fw-regular);\n  color:var(--text-primary);\n  background:var(--surface-page);\n  -webkit-font-smoothing:antialiased;\n  text-rendering:optimizeLegibility;\n}\nh1,h2,h3,h4,h5,h6{\n  font-family:var(--font-display);\n  font-weight:var(--fw-bold);\n  line-height:var(--lh-heading);\n  letter-spacing:var(--ls-tight);\n  color:var(--text-primary);\n  margin:0 0 .5em;\n}\nh1{font-size:var(--fs-h1)}\nh2{font-size:var(--fs-h2)}\nh3{font-size:var(--fs-h3)}\nh4{font-size:var(--fs-h4)}\np{margin:0 0 1em;text-wrap:pretty}\na{color:var(--text-link);text-decoration:none;transition:color var(--dur-fast) var(--ease-standard)}\na:hover{color:var(--text-link-hover);text-decoration:underline}\nstrong{font-weight:var(--fw-bold)}\nsmall{font-size:var(--fs-caption)}\n:focus-visible{outline:var(--focus-width) solid var(--focus-ring);outline-offset:var(--focus-offset)}\n/* Utility: uppercase eyebrow/locator label like \"FT. TOTTEN\" */\n.cfa-eyebrow{font-weight:var(--fw-medium);text-transform:uppercase;letter-spacing:var(--ls-label);font-size:var(--fs-label);color:var(--text-secondary)}\n<\u002Fstyle>\n  <style>/* ══════════════════════════════════════════════════════════════\n   Chick-fil-A Design System — global entry point.\n   Consumers link this one file. Import order matters:\n   fonts → tokens → base. Keep this file @import-only.\n   ══════════════════════════════════════════════════════════════ */\n/* Chick-fil-A brand typeface: Apercu (primary). */\n@font-face{font-family:\"Apercu\";src:url(\"79045054-a2c9-4768-9983-7bb75f4aa569\") format(\"opentype\");font-weight:400;font-style:normal;font-display:swap}\n@font-face{font-family:\"Apercu\";src:url(\"2dbd78bc-31ea-4dde-83c3-adda8297e0a7\") format(\"opentype\");font-weight:500;font-style:normal;font-display:swap}\n@font-face{font-family:\"Apercu\";src:url(\"5b3ccc33-581a-43e9-b5bb-38455877fa91\") format(\"opentype\");font-weight:700;font-style:normal;font-display:swap}\n\n/* ── Chick-fil-A Color System ──────────────────────────────────\n   Source of truth: Visual Identity Standards color swatches (RGB master).\n   Base palette = raw brand swatches. Semantic aliases follow below. */\n:root{\n  /* Primary */\n  --cfa-red:#DD0033;            /* PMS 186 C — the signature red */\n  --cfa-white:#FFFFFF;\n  --cfa-navy:#004F71;           /* PMS 3025 C */\n  --cfa-dark-red:#940929;       /* PMS 1955 C */\n\n  /* Neutrals */\n  --cfa-dark-gray:#5B6770;      /* PMS 431 C */\n  --cfa-gray:#DAD7D2;           /* PMS 2330 C */\n  --cfa-light-gray:#EEEDEB;     /* PMS Cool Gray 1 C */\n\n  /* Secondary — Blue family */\n  --cfa-blue:#3EB1C8;           /* PMS 631 C */\n  --cfa-light-blue:#A7CED8;     /* PMS 2204 C */\n\n  /* Secondary — Red / warm */\n  --cfa-bright-red:#FF1138;     /* PMS 185 C */\n  --cfa-orange:#E35205;         /* PMS 166 C */\n  --cfa-light-orange:#FA9370;   /* PMS 2023 C */\n  --cfa-pink:#F8C1B8;           /* PMS 2337 C */\n\n  /* Secondary — Green family */\n  --cfa-dark-green:#00635B;     /* PMS 7720 C */\n  --cfa-green:#249E6B;          /* PMS 2417 C */\n  --cfa-light-green:#B3CFAE;    /* PMS 2260 C */\n\n  /* Secondary — Yellow / cream */\n  --cfa-yellow:#FFB549;         /* PMS 1365 C */\n  --cfa-light-yellow:#F5E1A4;   /* PMS 7401 C */\n  --cfa-cream:#FCF7E7;          /* soft off-white background */\n\n  /* Secondary — Purple family */\n  --cfa-dark-purple:#5D3754;    /* PMS 7659 C */\n  --cfa-purple:#994878;         /* PMS 682 C */\n\n  /* ── Semantic aliases ── */\n  --color-brand:var(--cfa-red);\n  --color-brand-hover:var(--cfa-dark-red);\n  --color-brand-active:#7d0722;          /* darker than dark-red for press */\n\n  --text-primary:#1A1A1A;                /* near-black body text */\n  --text-secondary:var(--cfa-dark-gray);\n  --text-muted:#8A9299;                  /* lighter dark-gray */\n  --text-on-brand:var(--cfa-white);\n  --text-link:var(--cfa-red);\n  --text-link-hover:var(--cfa-dark-red);\n\n  --surface-page:var(--cfa-white);\n  --surface-cream:var(--cfa-cream);\n  --surface-card:var(--cfa-white);\n  --surface-subtle:var(--cfa-light-gray);\n  --surface-muted:var(--cfa-gray);\n  --surface-brand:var(--cfa-red);\n  --surface-navy:var(--cfa-navy);\n\n  --border-subtle:var(--cfa-light-gray);\n  --border-default:var(--cfa-gray);\n  --border-strong:var(--cfa-dark-gray);\n\n  --focus-ring:var(--cfa-blue);\n\n  --success:var(--cfa-green);\n  --info:var(--cfa-blue);\n  --warning:var(--cfa-yellow);\n  --danger:var(--cfa-red);\n}\n\n/* ── Chick-fil-A Typography ────────────────────────────────────\n   Apercu is the brand typeface across all applications. Apercu Bold\n   carries headlines; Medium for subheads/labels/buttons; Regular for body.\n   The Chick-fil-A script wordmark is a logo asset, never a font. */\n:root{\n  --font-sans:\"Apercu\",\"Helvetica Neue\",Arial,system-ui,sans-serif;\n  --font-body:var(--font-sans);\n  --font-display:var(--font-sans);\n  --font-mono:\"SFMono-Regular\",ui-monospace,Menlo,Consolas,monospace;\n\n  /* Weights */\n  --fw-regular:400; /* @kind font */\n  --fw-medium:500; /* @kind font */\n  --fw-bold:700; /* @kind font */\n\n  /* Type scale (1.250 major-third-ish, tuned) */\n  --fs-display:64px;\n  --fs-h1:48px;\n  --fs-h2:36px;\n  --fs-h3:28px;\n  --fs-h4:22px;\n  --fs-title:18px;\n  --fs-body:16px;\n  --fs-body-sm:14px;\n  --fs-caption:13px;\n  --fs-label:12px;\n\n  /* Line heights */\n  --lh-tight:1.05; /* @kind font */\n  --lh-heading:1.15; /* @kind font */\n  --lh-snug:1.35; /* @kind font */\n  --lh-body:1.55; /* @kind font */\n\n  /* Letter spacing */\n  --ls-tight:-0.02em; /* @kind font */\n  --ls-normal:0; /* @kind font */\n  --ls-label:0.08em;    /* uppercase labels/eyebrows @kind font */\n  --ls-wide:0.14em;     /* FT. TOTTEN-style locator caps @kind font */\n}\n\n/* ── Spacing, radii, layout ──────────────────────────────────── */\n:root{\n  /* 4px base scale */\n  --space-0:0;\n  --space-1:4px;\n  --space-2:8px;\n  --space-3:12px;\n  --space-4:16px;\n  --space-5:20px;\n  --space-6:24px;\n  --space-8:32px;\n  --space-10:40px;\n  --space-12:48px;\n  --space-16:64px;\n  --space-20:80px;\n  --space-24:96px;\n\n  /* Radii — CFA leans soft & friendly; pills for buttons/chips */\n  --radius-sm:6px;\n  --radius-md:10px;\n  --radius-lg:16px;\n  --radius-xl:24px;\n  --radius-pill:999px;\n  --radius-circle:50%;\n\n  /* Container widths */\n  --container-sm:640px;\n  --container-md:960px;\n  --container-lg:1200px;\n  --container-xl:1440px;\n}\n\n/* ── Elevation, shadow, motion ─────────────────────────────────\n   CFA digital surfaces use soft, low-contrast shadows and gentle,\n   quick easing. No harsh drop shadows; nothing bouncy or flashy. */\n:root{\n  --shadow-xs:0 1px 2px rgba(26,26,26,.06);\n  --shadow-sm:0 1px 3px rgba(26,26,26,.08),0 1px 2px rgba(26,26,26,.05);\n  --shadow-md:0 4px 12px rgba(26,26,26,.08);\n  --shadow-lg:0 10px 28px rgba(26,26,26,.10);\n  --shadow-xl:0 20px 48px rgba(26,26,26,.12);\n  --shadow-brand:0 8px 20px rgba(221,0,51,.24);\n\n  /* Motion */\n  --ease-standard:cubic-bezier(.4,0,.2,1); /* @kind other */\n  --ease-out:cubic-bezier(0,0,.2,1); /* @kind other */\n  --ease-in:cubic-bezier(.4,0,1,1); /* @kind other */\n  --dur-fast:120ms; /* @kind other */\n  --dur-base:200ms; /* @kind other */\n  --dur-slow:320ms; /* @kind other */\n\n  /* Focus */\n  --focus-width:3px; /* @kind other */\n  --focus-offset:2px; /* @kind other */\n}\n\n/* ── Base element styling (opt-in reset + brand defaults) ────── */\n*,*::before,*::after{box-sizing:border-box}\nbody{\n  margin:0;\n  font-family:var(--font-body);\n  font-size:var(--fs-body);\n  line-height:var(--lh-body);\n  font-weight:var(--fw-regular);\n  color:var(--text-primary);\n  background:var(--surface-page);\n  -webkit-font-smoothing:antialiased;\n  text-rendering:optimizeLegibility;\n}\nh1,h2,h3,h4,h5,h6{\n  font-family:var(--font-display);\n  font-weight:var(--fw-bold);\n  line-height:var(--lh-heading);\n  letter-spacing:var(--ls-tight);\n  color:var(--text-primary);\n  margin:0 0 .5em;\n}\nh1{font-size:var(--fs-h1)}\nh2{font-size:var(--fs-h2)}\nh3{font-size:var(--fs-h3)}\nh4{font-size:var(--fs-h4)}\np{margin:0 0 1em;text-wrap:pretty}\na{color:var(--text-link);text-decoration:none;transition:color var(--dur-fast) var(--ease-standard)}\na:hover{color:var(--text-link-hover);text-decoration:underline}\nstrong{font-weight:var(--fw-bold)}\nsmall{font-size:var(--fs-caption)}\n:focus-visible{outline:var(--focus-width) solid var(--focus-ring);outline-offset:var(--focus-offset)}\n/* Utility: uppercase eyebrow/locator label like \"FT. TOTTEN\" */\n.cfa-eyebrow{font-weight:var(--fw-medium);text-transform:uppercase;letter-spacing:var(--ls-label);font-size:var(--fs-label);color:var(--text-secondary)}\n\n<\u002Fstyle>\n  <script src=\"4ad91297-86df-4401-845e-5affb6b8f818\"><\u002Fscript>\n  <style>\n    *{box-sizing:border-box}\n    html,body{margin:0}\n    a{color:var(--cfa-red);text-decoration:none}\n    a:hover{color:var(--cfa-dark-red)}\n    .cfa-ta{font-family:var(--font-sans);font-size:16px;color:var(--text-primary);line-height:1.55;padding:12px 16px;border-radius:10px;border:2px solid var(--cfa-gray);background:#fff;outline:none;resize:vertical;width:100%;transition:border-color .15s}\n    .cfa-ta:focus{border-color:var(--cfa-blue);box-shadow:0 0 0 3px rgba(62,177,200,.18)}\n    .cfa-scroll::-webkit-scrollbar{width:10px}\n    .cfa-scroll::-webkit-scrollbar-thumb{background:var(--cfa-gray);border-radius:999px}\n    .cfa-ref-in{font-family:var(--font-sans);font-size:15px;font-weight:500;text-align:right;color:var(--text-primary);padding:7px 10px;border-radius:8px;border:1.5px solid var(--cfa-light-gray);background:#fff;outline:none;width:100%;transition:border-color .15s}\n    .cfa-ref-in:hover{border-color:var(--cfa-gray)}\n    .cfa-ref-in:focus{border-color:var(--cfa-blue);box-shadow:0 0 0 3px rgba(62,177,200,.18)}\n    @media print{\n      .no-print{display:none!important}\n      .app-shell{height:auto!important;overflow:visible!important}\n      .app-content{overflow:visible!important;height:auto!important;padding:0!important}\n    }\n  <\u002Fstyle>\n<\u002Fhelmet>\n<sc-if value=\"{{ showGate }}\">\n  <div style=\"min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--cfa-cream);font-family:var(--font-sans);padding:24px\">\n    <div style=\"background:#fff;border:1px solid var(--cfa-light-gray);border-radius:16px;box-shadow:var(--shadow-sm);padding:44px 40px;max-width:420px;width:100%;text-align:center\">\n      <img src=\"d36b2b74-f46f-4895-b6aa-76e74b7ef26e\" alt=\"Chick-fil-A\" style=\"height:54px;width:auto;margin:0 auto 20px;display:block\">\n      <div style=\"font-size:22px;font-weight:700;letter-spacing:-0.01em;line-height:1.2;margin-bottom:6px\">Monthly Marketing Plan Builder<\u002Fdiv>\n      <div style=\"font-size:11px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-muted);margin-bottom:24px\">Ft. Totten<\u002Fdiv>\n      <p style=\"font-size:15px;color:var(--text-secondary);line-height:1.5;margin:0 0 24px\">Please sign in with your Chick-fil-A account to continue.<\u002Fp>\n      <div id=\"g-signin\" style=\"display:flex;justify-content:center\"><\u002Fdiv>\n      <sc-if value=\"{{ authError }}\"><div style=\"font-size:13px;color:var(--cfa-red);margin-top:16px\">{{ authError }}<\u002Fdiv><\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsc-if>\n<sc-if value=\"{{ showApp }}\">\n<div class=\"app-shell\" style=\"height:100vh;display:flex;flex-direction:column;background:var(--cfa-cream);font-family:var(--font-sans);color:var(--text-primary)\">\n\n  <header class=\"no-print\" style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;padding:16px 28px;background:var(--cfa-red);flex:none\">\n    <div style=\"display:flex;align-items:center;gap:16px\">\n      <img src=\"13cc325c-8961-4c13-9f0f-0d0fbeb71ef1\" alt=\"Chick-fil-A\" style=\"height:30px;width:auto;display:block\">\n      <div style=\"width:1px;height:30px;background:rgba(255,255,255,.35)\"><\u002Fdiv>\n      <div>\n        <div style=\"font-size:18px;font-weight:700;color:#fff;letter-spacing:-0.01em;line-height:1.1\">Monthly Marketing Plan Builder<\u002Fdiv>\n        <div style=\"font-size:11px;font-weight:500;color:rgba(255,255,255,.85);letter-spacing:0.14em;text-transform:uppercase;margin-top:3px\">Ft. Totten<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.18);border-radius:999px;padding:8px 16px;font-size:13px;font-weight:500;color:#fff\">Step {{ stepNum }} of {{ stepCount }}<\u002Fdiv>\n  <\u002Fheader>\n\n  <div style=\"flex:1;display:flex;min-height:0\">\n\n    <nav class=\"no-print cfa-scroll\" style=\"width:280px;flex:none;background:#fff;border-right:1px solid var(--cfa-light-gray);overflow-y:auto;padding:20px 16px\">\n      <div style=\"font-size:11px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-muted);padding:4px 12px 12px\">Your Plan<\u002Fdiv>\n      <sc-for list=\"{{ steps }}\" as=\"s\" hint-placeholder-count=\"9\">\n        <button sc-camel-on-click=\"{{ s.onClick }}\" style=\"{{ s.rowStyle }}\">\n          <span style=\"{{ s.circleStyle }}\">{{ s.circleText }}<\u002Fspan>\n          <span style=\"{{ s.labelStyle }}\">{{ s.label }}<\u002Fspan>\n        <\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fnav>\n\n    <main class=\"app-content cfa-scroll\" style=\"flex:1;overflow-y:auto;padding:48px 56px\">\n      <div style=\"max-width:760px;margin:0 auto\">\n\n        <!-- STEP 1 · WELCOME -->\n        <sc-if value=\"{{ isS0 }}\" hint-placeholder-val=\"{{ true }}\">\n          <div>\n            <div style=\"font-size:12px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--cfa-red);margin-bottom:10px\">Step 1 · Welcome<\u002Fdiv>\n            <h2 style=\"font-size:36px;font-weight:700;letter-spacing:-0.02em;line-height:1.1;margin:0 0 14px\">Let's build your plan for the month<\u002Fh2>\n            <p style=\"font-size:17px;line-height:1.55;color:var(--text-secondary);margin:0 0 28px;max-width:60ch\">We're so glad you're here. Over the next few steps we'll walk through everything together — your goals, what worked last month, this month's focus, and the tactics that will get you there. There are no wrong answers. Just be honest and specific, and you'll leave with a clear, one-page plan you can share with your team.<\u002Fp>\n            <div style=\"display:flex;flex-direction:column;gap:20px;max-width:520px\">\n              <x-import component-from-global-scope=\"ChickFilADesignSystem_a0dd25.Input\" label=\"Planning month\" value=\"{{ values.month }}\" sc-camel-on-change=\"{{ h.month }}\" placeholder=\"August 2026\" hint-size=\"100%,74px\"><\u002Fx-import>\n              <x-import component-from-global-scope=\"ChickFilADesignSystem_a0dd25.Input\" label=\"Prepared by\" value=\"{{ values.preparedBy }}\" sc-camel-on-change=\"{{ h.preparedBy }}\" placeholder=\"Your name\" hint-size=\"100%,74px\"><\u002Fx-import>\n              <div>\n                <label style=\"font-size:14px;font-weight:500;display:block;margin-bottom:6px\">In one sentence, what would make this a great month?<\u002Flabel>\n                <textarea class=\"cfa-ta\" rows=\"2\" value=\"{{ values.objective }}\" sc-camel-on-change=\"{{ h.objective }}\" placeholder=\"e.g. Grow lunch transactions and get more guests ordering on the app.\"><\u002Ftextarea>\n                <span style=\"font-size:13px;color:var(--text-secondary);display:block;margin-top:6px\">This becomes the headline of your plan — keep it simple and concrete.<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- STEP 2 · GOALS -->\n        <sc-if value=\"{{ isS1 }}\">\n          <div>\n            <div style=\"font-size:12px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--cfa-red);margin-bottom:10px\">Step 2 · Goals &amp; Targets<\u002Fdiv>\n            <h2 style=\"font-size:36px;font-weight:700;letter-spacing:-0.02em;line-height:1.1;margin:0 0 14px\">Set your targets for the month<\u002Fh2>\n            <p style=\"font-size:17px;line-height:1.55;color:var(--text-secondary);margin:0 0 28px;max-width:60ch\">A good plan starts with a number. Use the reference below to see how the store is tracking, then enter what you're aiming for and we'll do the math — turning your sales goal into the transactions your team needs to serve each day. That daily number is your North Star.<\u002Fp>\n\n            <div style=\"border:1px solid var(--cfa-light-gray);border-radius:16px;overflow:hidden;background:#fff;margin-bottom:32px\">\n              <div style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;padding:16px 22px;background:var(--cfa-cream);border-bottom:1px solid var(--cfa-light-gray)\">\n                <div>\n                  <div style=\"font-size:16px;font-weight:700;letter-spacing:-0.01em\">Store Goals &amp; Results<\u002Fdiv>\n                  <div style=\"font-size:12.5px;color:var(--text-secondary);margin-top:2px\">For reference as you set this month's targets — realistic goals build on where we are today.<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"text-align:right;flex:none\">\n                  <label style=\"font-size:11px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted);display:block;margin-bottom:4px\">Annual Sales Goal<\u002Flabel>\n                  <input value=\"{{ values.annualGoal }}\" sc-camel-on-change=\"{{ h.annualGoal }}\" aria-label=\"Annual sales goal\" style=\"width:170px;text-align:right;font-family:var(--font-sans);font-size:24px;font-weight:700;color:var(--cfa-red);letter-spacing:-0.02em;padding:6px 12px;border:2px solid var(--cfa-gray);border-radius:10px;background:#fff;outline:none\">\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"padding:4px 22px 14px\">\n                <div style=\"display:grid;grid-template-columns:1.5fr 1fr 1fr 1fr;gap:12px;padding:12px 0;border-bottom:1px solid var(--cfa-light-gray);font-size:11px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted)\">\n                  <span>Metric<\u002Fspan>\n                  <span style=\"text-align:right\">Store Goal<\u002Fspan>\n                  <span style=\"text-align:right\">Last Month<\u002Fspan>\n                  <span style=\"text-align:right\">Year to Date<\u002Fspan>\n                <\u002Fdiv>\n                <sc-for list=\"{{ reference }}\" as=\"r\" hint-placeholder-count=\"5\">\n                  <div style=\"display:grid;grid-template-columns:1.5fr 1fr 1fr 1fr;gap:12px;padding:13px 0;border-bottom:1px solid var(--cfa-light-gray);align-items:center\">\n                    <span style=\"font-size:14px;font-weight:500\">{{ r.metric }}<\u002Fspan>\n                    <span style=\"text-align:right;font-size:15px;font-weight:700;color:var(--cfa-navy)\">{{ r.goal }}<\u002Fspan>\n                    <input class=\"cfa-ref-in\" value=\"{{ r.last }}\" sc-camel-on-change=\"{{ r.onLast }}\" aria-label=\"Last month value\">\n                    <input class=\"cfa-ref-in\" value=\"{{ r.year }}\" sc-camel-on-change=\"{{ r.onYear }}\" aria-label=\"Year to date value\">\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n                <div style=\"font-size:12px;color:var(--text-muted);margin-top:12px\">Reference figures — see the Sales Analytics report in the Analytics Hub.<\u002Fdiv>\n                <div style=\"font-size:12px;color:var(--text-muted);margin-top:4px\">Mobile sales include mobile app sales, POS scans, iPOS scans, and web orders.<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"background:var(--cfa-navy);border-radius:16px;padding:22px 26px;color:#fff;margin-bottom:20px;max-width:700px\">\n              <div style=\"font-size:12px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,.75);margin-bottom:10px\">Sales goal this month · auto-calculated<\u002Fdiv>\n              <div style=\"display:flex;align-items:baseline;gap:16px;flex-wrap:wrap\">\n                <div style=\"font-size:40px;font-weight:700;letter-spacing:-0.02em;line-height:1\">{{ autoSalesStr }}<\u002Fdiv>\n                <div style=\"font-size:14px;color:rgba(255,255,255,.85);line-height:1.45;max-width:34ch\">{{ autoSalesDeriv }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:20px;max-width:700px;margin-bottom:28px\">\n              <x-import component-from-global-scope=\"ChickFilADesignSystem_a0dd25.Input\" label=\"Check Average ($)\" type=\"text\" sc-camel-input-mode=\"decimal\" value=\"{{ values.avgCheck }}\" sc-camel-on-change=\"{{ h.avgCheck }}\" hint-size=\"100%,74px\"><\u002Fx-import>\n              <x-import component-from-global-scope=\"ChickFilADesignSystem_a0dd25.Input\" label=\"Days open this month\" type=\"text\" sc-camel-input-mode=\"numeric\" value=\"{{ values.daysOpen }}\" sc-camel-on-change=\"{{ h.daysOpen }}\" sc-camel-helper-text=\"We're closed on Sundays.\" hint-size=\"100%,74px\"><\u002Fx-import>\n              <x-import component-from-global-scope=\"ChickFilADesignSystem_a0dd25.Input\" label=\"Mobile sales goal (%)\" type=\"text\" sc-camel-input-mode=\"numeric\" value=\"{{ values.mobilePct }}\" sc-camel-on-change=\"{{ h.mobilePct }}\" sc-camel-helper-text=\"App, POS scans, iPOS scans &amp; web orders.\" hint-size=\"100%,90px\" <=\"\" x-import=\"\">\n            <\u002Fx-import><\u002Fdiv>\n\n            <div style=\"background:var(--cfa-navy);border-radius:16px;padding:28px 30px;color:#fff\">\n              <div style=\"font-size:12px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,.75);margin-bottom:6px\">Break it down by day<\u002Fdiv>\n              <div style=\"font-size:13px;color:rgba(255,255,255,.8);margin-bottom:18px\">Big goals feel reachable one day at a time. Here's what each day needs to look like.<\u002Fdiv>\n              <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-bottom:20px\">\n                <div>\n                  <div style=\"font-size:30px;font-weight:700;letter-spacing:-0.02em;line-height:1;color:var(--cfa-yellow)\">{{ dailySalesStr }}<\u002Fdiv>\n                  <div style=\"font-size:12.5px;color:rgba(255,255,255,.8);margin-top:6px\">Avg Daily Sales<\u002Fdiv>\n                <\u002Fdiv>\n                <div>\n                  <div style=\"font-size:30px;font-weight:700;letter-spacing:-0.02em;line-height:1;color:var(--cfa-yellow)\">{{ txPerDayStr }}<\u002Fdiv>\n                  <div style=\"font-size:12.5px;color:rgba(255,255,255,.8);margin-top:6px\">guests served daily<\u002Fdiv>\n                <\u002Fdiv>\n                <div>\n                  <div style=\"font-size:30px;font-weight:700;letter-spacing:-0.02em;line-height:1\">{{ dailyMobileStr }}<\u002Fdiv>\n                  <div style=\"font-size:12.5px;color:rgba(255,255,255,.8);margin-top:6px\">mobile sales daily<\u002Fdiv>\n                <\u002Fdiv>\n                <div>\n                  <div style=\"font-size:30px;font-weight:700;letter-spacing:-0.02em;line-height:1\">{{ mobileTxPerDayStr }}<\u002Fdiv>\n                  <div style=\"font-size:12.5px;color:rgba(255,255,255,.8);margin-top:6px\">mobile orders daily<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"font-size:15px;line-height:1.55;color:rgba(255,255,255,.95);border-top:1px solid rgba(255,255,255,.2);padding-top:16px\">{{ coach }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- STEP 3 · LOOK BACK -->\n        <sc-if value=\"{{ isS2 }}\">\n          <div>\n            <div style=\"font-size:12px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--cfa-red);margin-bottom:10px\">Step 3 · Look Back<\u002Fdiv>\n            <h2 style=\"font-size:36px;font-weight:700;letter-spacing:-0.02em;line-height:1.1;margin:0 0 14px\">What worked last month?<\u002Fh2>\n            <p style=\"font-size:17px;line-height:1.55;color:var(--text-secondary);margin:0 0 28px;max-width:60ch\">The best ideas for this month are often hiding in last month's results. Take a moment to reflect — the wins are worth repeating, and every miss is a lesson.<\u002Fp>\n            <div style=\"display:flex;flex-direction:column;gap:22px;max-width:620px\">\n              <div>\n                <label style=\"font-size:14px;font-weight:500;display:block;margin-bottom:6px\">Our biggest win last month<\u002Flabel>\n                <textarea class=\"cfa-ta\" rows=\"2\" value=\"{{ values.lastWin }}\" sc-camel-on-change=\"{{ h.lastWin }}\" placeholder=\"e.g. Spirit night with Truesdell Elementary drove our best Tuesday of the month.\"><\u002Ftextarea>\n              <\u002Fdiv>\n              <div>\n                <label style=\"font-size:14px;font-weight:500;display:block;margin-bottom:6px\">Something worth repeating<\u002Flabel>\n                <textarea class=\"cfa-ta\" rows=\"2\" value=\"{{ values.repeat }}\" sc-camel-on-change=\"{{ h.repeat }}\" placeholder=\"What would you do again, and why did it work?\"><\u002Ftextarea>\n              <\u002Fdiv>\n              <div>\n                <label style=\"font-size:14px;font-weight:500;display:block;margin-bottom:6px\">One number that moved (up or down)<\u002Flabel>\n                <textarea class=\"cfa-ta\" rows=\"2\" value=\"{{ values.lookbackNote }}\" sc-camel-on-change=\"{{ h.lookbackNote }}\" placeholder=\"e.g. Mobile orders were up 8%, but catering slipped — worth a push this month.\"><\u002Ftextarea>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- STEP 4 · THEME -->\n        <sc-if value=\"{{ isS3 }}\">\n          <div>\n            <div style=\"font-size:12px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--cfa-red);margin-bottom:10px\">Step 4 · Monthly Theme<\u002Fdiv>\n            <h2 style=\"font-size:36px;font-weight:700;letter-spacing:-0.02em;line-height:1.1;margin:0 0 14px\">Give the month a focus<\u002Fh2>\n            <p style=\"font-size:17px;line-height:1.55;color:var(--text-secondary);margin:0 0 28px;max-width:60ch\">A single theme keeps your team and your guests pointed the same direction. It can tie to a season, a menu item, or a goal — like \"Back-to-School Breakfast\" or \"Catering for Game Day.\" Everything else in your plan should support it.<\u002Fp>\n            <div style=\"display:flex;flex-direction:column;gap:22px;max-width:620px\">\n              <x-import component-from-global-scope=\"ChickFilADesignSystem_a0dd25.Input\" label=\"This month's theme\" value=\"{{ values.theme }}\" sc-camel-on-change=\"{{ h.theme }}\" placeholder=\"e.g. Back-to-School Breakfast Rush\" hint-size=\"100%,74px\"><\u002Fx-import>\n              <div>\n                <label style=\"font-size:14px;font-weight:500;display:block;margin-bottom:6px\">Why this theme, right now?<\u002Flabel>\n                <textarea class=\"cfa-ta\" rows=\"3\" value=\"{{ values.themeWhy }}\" sc-camel-on-change=\"{{ h.themeWhy }}\" placeholder=\"What's happening this month that makes this the right focus for our guests?\"><\u002Ftextarea>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- STEP 5 · PROMOS -->\n        <sc-if value=\"{{ isS4 }}\">\n          <div>\n            <div style=\"font-size:12px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--cfa-red);margin-bottom:10px\">Step 5 · Promotions &amp; Bundles<\u002Fdiv>\n            <h2 style=\"font-size:36px;font-weight:700;letter-spacing:-0.02em;line-height:1.1;margin:0 0 14px\">Plan your offers<\u002Fh2>\n            <p style=\"font-size:17px;line-height:1.55;color:var(--text-secondary);margin:0 0 28px;max-width:60ch\">Offers give guests a reason to visit now. List any limited-time offers you're featuring, plus products that lift the average check. A little goes a long way — pick a couple you can execute well.<\u002Fp>\n            <div style=\"display:flex;flex-direction:column;gap:22px;max-width:620px\">\n              <div>\n                <label style=\"font-size:14px;font-weight:500;display:block;margin-bottom:6px\">Limited-time offers (LTOs) this month<\u002Flabel>\n                <textarea class=\"cfa-ta\" rows=\"3\" value=\"{{ values.promos }}\" sc-camel-on-change=\"{{ h.promos }}\" placeholder=\"e.g. Free medium Waffle Potato Fries® with any app order, first two weeks.\"><\u002Ftextarea>\n              <\u002Fdiv>\n              <div>\n                <label style=\"font-size:14px;font-weight:500;display:block;margin-bottom:6px\">&nbsp;Featured Products<\u002Flabel>\n                <textarea class=\"cfa-ta\" rows=\"3\" value=\"{{ values.bundles }}\" sc-camel-on-change=\"{{ h.bundles }}\" placeholder=\"e.g. Family Meal bundle for weeknight dinners; feature the Chick-fil-A® Chicken Sandwich meal.\" style=\"width: 518px; height: 112px\"><\u002Ftextarea>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- STEP 6 · TACTICS -->\n        <sc-if value=\"{{ isS5 }}\">\n          <div>\n            <div style=\"font-size:12px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--cfa-red);margin-bottom:10px\">Step 6 · Tactics by Channel<\u002Fdiv>\n            <h2 style=\"font-size:36px;font-weight:700;letter-spacing:-0.02em;line-height:1.1;margin:0 0 14px\">Choose how you'll reach guests<\u002Fh2>\n            <p style=\"font-size:17px;line-height:1.55;color:var(--text-secondary);margin:0 0 30px;max-width:60ch\">Tap the ideas you'll run this month. Don't try to do everything — a focused plan beats a busy one. Aim for a few strong tactics across two or three channels that support your theme.<\u002Fp>\n            <div style=\"display:flex;flex-direction:column;gap:26px\">\n              <sc-for list=\"{{ channels }}\" as=\"chan\" hint-placeholder-count=\"4\">\n                <div style=\"border:1px solid var(--cfa-light-gray);border-radius:16px;padding:22px 24px;background:#fff\">\n                  <div style=\"font-size:18px;font-weight:700;letter-spacing:-0.01em;margin-bottom:3px\">{{ chan.name }}<\u002Fdiv>\n                  <div style=\"font-size:13.5px;color:var(--text-secondary);margin-bottom:16px\">{{ chan.hint }}<\u002Fdiv>\n                  <div style=\"display:flex;flex-wrap:wrap;gap:10px\">\n                    <sc-for list=\"{{ chan.chips }}\" as=\"chip\" hint-placeholder-count=\"5\">\n                      <button sc-camel-on-click=\"{{ chip.toggle }}\" style=\"{{ chip.style }}\">{{ chip.label }}<\u002Fbutton>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                  <div style=\"display:flex;gap:8px;margin-top:14px\">\n                    <input value=\"{{ chan.draft }}\" sc-camel-on-change=\"{{ chan.onDraft }}\" sc-camel-on-key-down=\"{{ chan.onKey }}\" placeholder=\"Add your own event or activity…\" style=\"flex:1;font-family:var(--font-sans);font-size:14px;color:var(--text-primary);padding:9px 14px;border-radius:999px;border:2px solid var(--cfa-light-gray);background:#fff;outline:none\">\n                    <button sc-camel-on-click=\"{{ chan.onAdd }}\" style=\"flex:none;font-family:var(--font-sans);font-size:14px;font-weight:500;padding:9px 20px;border-radius:999px;border:none;background:var(--cfa-navy);color:#fff;cursor:pointer\">Add<\u002Fbutton>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n\n            <div style=\"margin-top:38px;border-top:2px solid var(--cfa-light-gray);padding-top:32px\">\n              <div style=\"font-size:12px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--cfa-red);margin-bottom:10px\">Tie It To Your Goals<\u002Fdiv>\n              <h3 style=\"font-size:26px;font-weight:700;letter-spacing:-0.02em;line-height:1.15;margin:0 0 10px\">How will these move the metrics?<\u002Fh3>\n              <p style=\"font-size:16px;line-height:1.55;color:var(--text-secondary);margin:0 0 24px;max-width:62ch\">For every tactic you picked, choose the goal it supports and note how it'll help. This keeps your plan honest — if a tactic doesn't move a number, it may not be worth the effort.<\u002Fp>\n              <sc-if value=\"{{ hasSelected }}\">\n                <div style=\"display:flex;flex-direction:column;gap:16px\">\n                  <sc-for list=\"{{ alignRows }}\" as=\"a\" hint-placeholder-count=\"3\">\n                    <div style=\"border:1px solid var(--cfa-light-gray);border-radius:14px;padding:20px 22px;background:#fff\">\n                      <div style=\"display:flex;align-items:baseline;gap:10px;margin-bottom:14px;flex-wrap:wrap\">\n                        <span style=\"font-size:16px;font-weight:700;letter-spacing:-0.01em\">{{ a.label }}<\u002Fspan>\n                        <span style=\"font-size:12px;font-weight:500;color:var(--text-muted);letter-spacing:0.06em;text-transform:uppercase\">{{ a.channel }}<\u002Fspan>\n                      <\u002Fdiv>\n                      <div style=\"display:flex;flex-direction:column;gap:14px\">\n                        <div style=\"display:flex;gap:16px;flex-wrap:wrap;align-items:start\">\n                          <x-import component-from-global-scope=\"ChickFilADesignSystem_a0dd25.Select\" label=\"Supports this goal\" value=\"{{ a.metric }}\" sc-camel-on-change=\"{{ a.onMetric }}\" style=\"width:250px\" hint-size=\"250px,74px\">\n                            <option value=\"\">Choose a goal…<\u002Foption>\n                            <option value=\"Monthly sales\">Monthly sales<\u002Foption>\n                            <option value=\"Transactions per day\">Transactions per day<\u002Foption>\n                            <option value=\"Check average\">Check average<\u002Foption>\n                            <option value=\"Mobile sales transactions\">Mobile sales transactions<\u002Foption>\n                            <option value=\"Catering sales\">Catering sales<\u002Foption>\n                            <option value=\"New Chick-fil-A One® members\">New Chick-fil-A One® members<\u002Foption>\n                            <option value=\"Guest (CEM) score\">Guest (CEM) score<\u002Foption>\n                          <\u002Fx-import>\n                          <div style=\"width:230px\">\n                            <label style=\"font-size:14px;font-weight:500;display:block;margin-bottom:6px\">{{ a.impactLabel }}<\u002Flabel>\n                            <input class=\"cfa-ta\" sc-camel-input-mode=\"decimal\" value=\"{{ a.impact }}\" sc-camel-on-change=\"{{ a.onImpact }}\" placeholder=\"{{ a.impactPh }}\">\n                          <\u002Fdiv>\n                        <\u002Fdiv>\n                        <div>\n                          <label style=\"font-size:14px;font-weight:500;display:block;margin-bottom:6px\">How it contributes<\u002Flabel>\n                          <textarea class=\"cfa-ta\" rows=\"2\" value=\"{{ a.why }}\" sc-camel-on-change=\"{{ a.onWhy }}\" placeholder=\"e.g. Family Night fills the dining room on a slow Tuesday — the extra covers above drive the number at left.\"><\u002Ftextarea>\n                        <\u002Fdiv>\n                      <\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ noSelected }}\">\n                <div style=\"font-size:15px;color:var(--text-muted);background:var(--cfa-cream);border-radius:12px;padding:18px 20px\">Choose a few tactics above and they'll appear here to align with your goals.<\u002Fdiv>\n              <\u002Fsc-if>\n\n              <sc-if value=\"{{ hasProjection }}\">\n                <div style=\"background:var(--cfa-navy);border-radius:16px;padding:24px 26px;color:#fff;margin-top:24px\">\n                  <div style=\"font-size:12px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,.75);margin-bottom:6px\">Projected Contribution<\u002Fdiv>\n                  <div style=\"font-size:13px;color:rgba(255,255,255,.8);margin-bottom:20px\">What your chosen tactics add up to this month, based on your estimates.<\u002Fdiv>\n                  <div style=\"display:flex;flex-wrap:wrap;gap:32px\">\n                    <sc-for list=\"{{ projection }}\" as=\"p\" hint-placeholder-count=\"2\">\n                      <div>\n                        <div style=\"font-size:28px;font-weight:700;letter-spacing:-0.02em;line-height:1;color:var(--cfa-yellow)\">{{ p.totalStr }}<\u002Fdiv>\n                        <div style=\"font-size:13px;color:rgba(255,255,255,.85);margin-top:6px\">{{ p.metric }}<\u002Fdiv>\n                        <sc-if value=\"{{ p.hasGoal }}\"><div style=\"font-size:12px;color:rgba(255,255,255,.7);margin-top:2px\">{{ p.pctStr }} · goal {{ p.goalStr }}<\u002Fdiv><\u002Fsc-if>\n                      <\u002Fdiv>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- STEP 7 · TEAM CONTEST -->\n        <sc-if value=\"{{ isS6 }}\">\n          <div>\n            <div style=\"font-size:12px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--cfa-red);margin-bottom:10px\">Step 7 · Team Contest<\u002Fdiv>\n            <h2 style=\"font-size:36px;font-weight:700;letter-spacing:-0.02em;line-height:1.1;margin:0 0 14px\">Rally the team with a contest<\u002Fh2>\n            <p style=\"font-size:17px;line-height:1.55;color:var(--text-secondary);margin:0 0 28px;max-width:60ch\">Your team makes the plan happen. A friendly contest keeps the goals top of mind and makes the month fun. Set up one or more contests, then pick the rewards worth competing for.<\u002Fp>\n            <div style=\"display:flex;flex-direction:column;gap:22px\">\n              <sc-for list=\"{{ contestBlocks }}\" as=\"ct\" hint-placeholder-count=\"1\">\n                <div style=\"border:1px solid var(--cfa-light-gray);border-radius:16px;padding:24px;background:#fff\">\n                  <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px\">\n                    <div style=\"font-size:12px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--cfa-red)\">{{ ct.title }}<\u002Fdiv>\n                    <sc-if value=\"{{ ct.canRemove }}\">\n                      <button sc-camel-on-click=\"{{ ct.onRemove }}\" style=\"font-family:var(--font-sans);font-size:13px;font-weight:500;padding:6px 14px;border-radius:999px;border:none;background:var(--cfa-light-gray);color:var(--cfa-dark-gray);cursor:pointer\">Remove<\u002Fbutton>\n                    <\u002Fsc-if>\n                  <\u002Fdiv>\n                  <div style=\"display:flex;flex-direction:column;gap:18px;margin-bottom:22px\">\n                    <x-import component-from-global-scope=\"ChickFilADesignSystem_a0dd25.Input\" label=\"Contest name\" value=\"{{ ct.name }}\" sc-camel-on-change=\"{{ ct.onName }}\" placeholder=\"e.g. Mobile Order Madness\" hint-size=\"100%,74px\"><\u002Fx-import>\n                    <div>\n                      <label style=\"font-size:14px;font-weight:500;display:block;margin-bottom:6px\">What should it drive?<\u002Flabel>\n                      <textarea class=\"cfa-ta\" rows=\"2\" value=\"{{ ct.focus }}\" sc-camel-on-change=\"{{ ct.onFocus }}\" placeholder=\"e.g. Most Chick-fil-A One® sign-ups per shift; every Team Member asks each guest about the app.\"><\u002Ftextarea>\n                    <\u002Fdiv>\n                    <x-import component-from-global-scope=\"ChickFilADesignSystem_a0dd25.Input\" label=\"Contest dates\" value=\"{{ ct.dates }}\" sc-camel-on-change=\"{{ ct.onDates }}\" placeholder=\"e.g. Aug 1 – Aug 21\" hint-size=\"100%,74px\"><\u002Fx-import>\n                  <\u002Fdiv>\n                  <div style=\"font-size:12px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--cfa-red);margin-bottom:12px\">Rewards to compete for<\u002Fdiv>\n                  <div style=\"display:flex;flex-wrap:wrap;gap:10px;margin-bottom:14px\">\n                    <sc-for list=\"{{ ct.rewardChips }}\" as=\"r\" hint-placeholder-count=\"8\">\n                      <button sc-camel-on-click=\"{{ r.toggle }}\" style=\"{{ r.style }}\">{{ r.label }}<\u002Fbutton>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                  <div style=\"display:flex;gap:8px;max-width:520px\">\n                    <input value=\"{{ ct.rewardDraft }}\" sc-camel-on-change=\"{{ ct.onRewardDraft }}\" sc-camel-on-key-down=\"{{ ct.onRewardKey }}\" placeholder=\"Add another reward…\" style=\"flex:1;font-family:var(--font-sans);font-size:14px;color:var(--text-primary);padding:9px 14px;border-radius:999px;border:2px solid var(--cfa-light-gray);background:#fff;outline:none\">\n                    <button sc-camel-on-click=\"{{ ct.onRewardAdd }}\" style=\"flex:none;font-family:var(--font-sans);font-size:14px;font-weight:500;padding:9px 20px;border-radius:999px;border:none;background:var(--cfa-navy);color:#fff;cursor:pointer\">Add<\u002Fbutton>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <button sc-camel-on-click=\"{{ onAddContest }}\" style=\"margin-top:18px;font-family:var(--font-sans);font-size:15px;font-weight:500;padding:12px 24px;border-radius:999px;border:2px dashed var(--cfa-gray);background:#fff;color:var(--cfa-navy);cursor:pointer\">+ Add another contest<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- STEP 8 · COST TO EXECUTE -->\n        <sc-if value=\"{{ isS7 }}\">\n          <div>\n            <div style=\"font-size:12px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--cfa-red);margin-bottom:10px\">Step 8 · Cost to Execute<\u002Fdiv>\n            <h2 style=\"font-size:36px;font-weight:700;letter-spacing:-0.02em;line-height:1.1;margin:0 0 14px\">What will it take to pull off?<\u002Fh2>\n            <p style=\"font-size:17px;line-height:1.55;color:var(--text-secondary);margin:0 0 26px;max-width:60ch\">List the goods you'll need to purchase to run your activities, events, signage, and contest rewards. A clear budget makes it easy for the Operator to say yes.<\u002Fp>\n            <div style=\"max-width:760px\">\n              <div style=\"display:grid;grid-template-columns:1fr 150px 130px 40px;gap:12px;padding-bottom:8px;font-size:11px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted)\">\n                <span>Item to purchase<\u002Fspan><span>Category<\u002Fspan><span style=\"text-align:right\">Est. cost<\u002Fspan><span><\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:10px\">\n                <sc-for list=\"{{ costRows }}\" as=\"c\" hint-placeholder-count=\"2\">\n                  <div style=\"display:grid;grid-template-columns:1fr 150px 130px 40px;gap:12px;align-items:center\">\n                    <input value=\"{{ c.desc }}\" sc-camel-on-change=\"{{ c.onDesc }}\" placeholder=\"e.g. Vinyl banner for Family Night\" style=\"font-family:var(--font-sans);font-size:14px;color:var(--text-primary);padding:10px 14px;border-radius:10px;border:2px solid var(--cfa-light-gray);background:#fff;outline:none\">\n                    <sc-raw-select value=\"{{ c.category }}\" sc-camel-on-change=\"{{ c.onCat }}\" style=\"font-family:var(--font-sans);font-size:14px;color:var(--text-primary);padding:10px 12px;border-radius:10px;border:2px solid var(--cfa-light-gray);background:#fff;outline:none;cursor:pointer\">\n                      <option value=\"\">Category…<\u002Foption>\n                      <option value=\"Signage\">Signage<\u002Foption>\n                      <option value=\"Event\">Event<\u002Foption>\n                      <option value=\"Activity\">Activity<\u002Foption>\n                      <option value=\"Supplies\">Supplies<\u002Foption>\n                      <option value=\"Reward\">Reward<\u002Foption>\n                      <option value=\"Other\">Other<\u002Foption>\n                    <\u002Fsc-raw-select>\n                    <input value=\"{{ c.cost }}\" sc-camel-on-change=\"{{ c.onCost }}\" sc-camel-input-mode=\"decimal\" placeholder=\"$0\" style=\"font-family:var(--font-sans);font-size:14px;text-align:right;color:var(--text-primary);padding:10px 14px;border-radius:10px;border:2px solid var(--cfa-light-gray);background:#fff;outline:none\">\n                    <button sc-camel-on-click=\"{{ c.onRemove }}\" aria-label=\"Remove item\" style=\"width:36px;height:36px;border-radius:999px;border:none;background:var(--cfa-light-gray);color:var(--cfa-dark-gray);font-size:18px;cursor:pointer;line-height:1\">×<\u002Fbutton>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <button sc-camel-on-click=\"{{ onCostAdd }}\" style=\"margin-top:14px;font-family:var(--font-sans);font-size:14px;font-weight:500;padding:10px 20px;border-radius:999px;border:2px dashed var(--cfa-gray);background:#fff;color:var(--cfa-navy);cursor:pointer\">+ Add line item<\u002Fbutton>\n              <div style=\"display:flex;justify-content:space-between;align-items:center;margin-top:22px;padding-top:18px;border-top:2px solid var(--cfa-light-gray)\">\n                <span style=\"font-size:15px;font-weight:500;color:var(--text-secondary)\">Total cost to execute<\u002Fspan>\n                <span style=\"font-size:28px;font-weight:700;letter-spacing:-0.02em;color:var(--cfa-navy)\">{{ costTotalStr }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- STEP 9 · METRICS -->\n        <sc-if value=\"{{ isS8 }}\">\n          <div>\n            <div style=\"font-size:12px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--cfa-red);margin-bottom:10px\">Step 9 · How You'll Measure<\u002Fdiv>\n            <h2 style=\"font-size:36px;font-weight:700;letter-spacing:-0.02em;line-height:1.1;margin:0 0 14px\">Decide what success looks like<\u002Fh2>\n            <p style=\"font-size:17px;line-height:1.55;color:var(--text-secondary);margin:0 0 26px;max-width:60ch\">Pick the handful of numbers you'll watch each week. If a tactic isn't moving one of these, it's okay to adjust. What gets measured gets done.<\u002Fp>\n            <div style=\"display:flex;flex-wrap:wrap;gap:10px;margin-bottom:28px\">\n              <sc-for list=\"{{ kpis }}\" as=\"k\" hint-placeholder-count=\"8\">\n                <button sc-camel-on-click=\"{{ k.toggle }}\" style=\"{{ k.style }}\">{{ k.label }}<\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <sc-if value=\"{{ hasKpiGoals }}\">\n              <div style=\"font-size:12px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--cfa-red);margin-bottom:8px\">Set the goal for each<\u002Fdiv>\n              <p style=\"font-size:15px;line-height:1.5;color:var(--text-secondary);margin:0 0 16px;max-width:60ch\">State the number that means you hit it — this is what determines success when you track it each week.<\u002Fp>\n              <div style=\"display:flex;flex-direction:column;gap:10px;max-width:620px;margin-bottom:28px\">\n                <sc-for list=\"{{ kpiGoalRows }}\" as=\"g\" hint-placeholder-count=\"3\">\n                  <div style=\"display:grid;grid-template-columns:1fr 200px;gap:14px;align-items:center\">\n                    <span style=\"font-size:15px;font-weight:500;color:var(--text-primary)\">{{ g.label }}<\u002Fspan>\n                    <input value=\"{{ g.target }}\" sc-camel-on-change=\"{{ g.onTarget }}\" placeholder=\"Success target…\" style=\"font-family:var(--font-sans);font-size:15px;color:var(--text-primary);padding:10px 14px;border-radius:10px;border:2px solid var(--cfa-light-gray);background:#fff;outline:none\">\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <div style=\"max-width:620px\">\n              <label style=\"font-size:14px;font-weight:500;display:block;margin-bottom:6px\">Weekly check-in note<\u002Flabel>\n              <textarea class=\"cfa-ta\" rows=\"3\" value=\"{{ values.kpiNotes }}\" sc-camel-on-change=\"{{ h.kpiNotes }}\" placeholder=\"e.g. Review these every Monday with the team; celebrate wins and adjust what's not working.\"><\u002Ftextarea>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- STEP 10 · REVIEW -->\n        <sc-if value=\"{{ isS9 }}\">\n          <div>\n            <div class=\"no-print\" style=\"font-size:12px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--cfa-red);margin-bottom:10px\">Step 10 · Your Plan<\u002Fdiv>\n            <div class=\"no-print\" style=\"display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:20px;background:var(--cfa-cream);border-radius:14px;padding:16px 20px\">\n              <x-import component-from-global-scope=\"ChickFilADesignSystem_a0dd25.Button\" variant=\"primary\" sc-camel-on-click=\"{{ onSubmit }}\" hint-size=\"auto,44px\">Submit for Operator Review<\u002Fx-import>\n              <span style=\"font-size:14px;font-weight:500;color:var(--cfa-navy)\">{{ submitMsg }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"border:1px solid var(--cfa-light-gray);border-radius:16px;overflow:hidden;background:#fff;box-shadow:var(--shadow-sm)\">\n              <div style=\"background:var(--cfa-red);padding:26px 30px;color:#fff\">\n                <div style=\"font-size:11px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:rgba(255,255,255,.85)\">Marketing Plan · {{ sumMonth }}<\u002Fdiv>\n                <div style=\"font-size:26px;font-weight:700;letter-spacing:-0.02em;line-height:1.2;margin-top:8px\">{{ sumObjective }}<\u002Fdiv>\n                <div style=\"font-size:13px;color:rgba(255,255,255,.85);margin-top:10px\">Chick-fil-A Ft. Totten · Prepared by {{ sumPreparedBy }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"padding:30px\">\n\n                <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px\">\n                  <div style=\"background:var(--cfa-cream);border-radius:12px;padding:16px\">\n                    <div style=\"font-size:22px;font-weight:700;letter-spacing:-0.02em;color:var(--cfa-navy)\">{{ sumSales }}<\u002Fdiv>\n                    <div style=\"font-size:12px;color:var(--text-secondary);margin-top:4px\">sales goal<\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"background:var(--cfa-cream);border-radius:12px;padding:16px\">\n                    <div style=\"font-size:22px;font-weight:700;letter-spacing:-0.02em;color:var(--cfa-navy)\">{{ txPerDayStr }}<\u002Fdiv>\n                    <div style=\"font-size:12px;color:var(--text-secondary);margin-top:4px\">transactions / day<\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"background:var(--cfa-cream);border-radius:12px;padding:16px\">\n                    <div style=\"font-size:22px;font-weight:700;letter-spacing:-0.02em;color:var(--cfa-navy)\">{{ sumAvg }}<\u002Fdiv>\n                    <div style=\"font-size:12px;color:var(--text-secondary);margin-top:4px\">check average<\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"background:var(--cfa-cream);border-radius:12px;padding:16px\">\n                    <div style=\"font-size:22px;font-weight:700;letter-spacing:-0.02em;color:var(--cfa-navy)\">{{ values.mobilePct }}%<\u002Fdiv>\n                    <div style=\"font-size:12px;color:var(--text-secondary);margin-top:4px\">mobile sales goal<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n\n                <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:26px\">\n                  <div>\n                    <div style=\"font-size:11px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--cfa-red);margin-bottom:8px\">This Month's Theme<\u002Fdiv>\n                    <div style=\"font-size:16px;font-weight:700;margin-bottom:4px\">{{ sumTheme }}<\u002Fdiv>\n                    <div style=\"font-size:14px;color:var(--text-secondary);line-height:1.5;white-space:pre-wrap\">{{ sumThemeWhy }}<\u002Fdiv>\n                  <\u002Fdiv>\n                  <div>\n                    <div style=\"font-size:11px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--cfa-red);margin-bottom:8px\">Building On<\u002Fdiv>\n                    <div style=\"font-size:14px;color:var(--text-secondary);line-height:1.5;white-space:pre-wrap\">{{ sumLastWin }}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n\n                <div style=\"height:1px;background:var(--cfa-light-gray);margin:26px 0\"><\u002Fdiv>\n\n                <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:26px;margin-bottom:26px\">\n                  <div>\n                    <div style=\"font-size:11px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--cfa-red);margin-bottom:8px\">Promotions &amp; Bundles<\u002Fdiv>\n                    <div style=\"font-size:14px;color:var(--text-secondary);line-height:1.5;white-space:pre-wrap\">{{ sumPromos }}<\u002Fdiv>\n                    <div style=\"font-size:14px;color:var(--text-secondary);line-height:1.5;white-space:pre-wrap;margin-top:8px\">{{ sumBundles }}<\u002Fdiv>\n                  <\u002Fdiv>\n                  <div>\n                    <div style=\"font-size:11px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--cfa-red);margin-bottom:8px\">Team Contests<\u002Fdiv>\n                    <div style=\"display:flex;flex-direction:column;gap:14px\">\n                      <sc-for list=\"{{ contestSummary }}\" as=\"ct\" hint-placeholder-count=\"1\">\n                        <div>\n                          <div style=\"font-size:16px;font-weight:700;margin-bottom:2px\">{{ ct.name }}<\u002Fdiv>\n                          <div style=\"font-size:13px;color:var(--text-muted);margin-bottom:4px\">{{ ct.dates }}<\u002Fdiv>\n                          <div style=\"font-size:14px;color:var(--text-secondary);line-height:1.5;white-space:pre-wrap\">{{ ct.focus }}<\u002Fdiv>\n                          <sc-if value=\"{{ ct.hasRewards }}\">\n                            <div style=\"display:flex;flex-wrap:wrap;gap:6px;margin-top:8px\">\n                              <sc-for list=\"{{ ct.rewards }}\" as=\"rw\">\n                                <span style=\"font-size:12px;font-weight:500;background:var(--cfa-cream);border:1px solid var(--cfa-gray);border-radius:999px;padding:4px 12px\">{{ rw }}<\u002Fspan>\n
