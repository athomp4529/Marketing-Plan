        <\u002Fsc-for>\n                            <\u002Fdiv>\n                          <\u002Fsc-if>\n                        <\u002Fdiv>\n                      <\u002Fsc-for>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n\n                <div style=\"font-size:11px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--cfa-red);margin-bottom:12px\">Tactics This Month<\u002Fdiv>\n                <sc-if value=\"{{ hasTactics }}\">\n                  <div style=\"display:flex;flex-direction:column;gap:14px;margin-bottom:26px\">\n                    <sc-for list=\"{{ selectedByChannel }}\" as=\"grp\" hint-placeholder-count=\"3\">\n                      <div>\n                        <div style=\"font-size:14px;font-weight:700;margin-bottom:6px\">{{ grp.name }}<\u002Fdiv>\n                        <div style=\"display:flex;flex-wrap:wrap;gap:8px\">\n                          <sc-for list=\"{{ grp.items }}\" as=\"it\">\n                            <span style=\"font-size:13px;font-weight:500;background:var(--cfa-cream);border:1px solid var(--cfa-gray);color:var(--text-primary);border-radius:999px;padding:6px 14px\">{{ it }}<\u002Fspan>\n                          <\u002Fsc-for>\n                        <\u002Fdiv>\n                      <\u002Fdiv>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ noTactics }}\">\n                  <div style=\"font-size:14px;color:var(--text-muted);margin-bottom:26px\">No tactics selected yet — head back to Step 6 to choose a few.<\u002Fdiv>\n                <\u002Fsc-if>\n\n                <sc-if value=\"{{ hasAlign }}\">\n                  <div style=\"font-size:11px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--cfa-red);margin-bottom:12px\">How These Support The Goals<\u002Fdiv>\n                  <div style=\"display:flex;flex-direction:column;gap:12px;margin-bottom:26px\">\n                    <sc-for list=\"{{ alignSummary }}\" as=\"a\" hint-placeholder-count=\"3\">\n                      <div style=\"display:grid;grid-template-columns:200px 1fr;gap:14px;padding:12px 0;border-bottom:1px solid var(--cfa-light-gray);align-items:baseline\">\n                        <div>\n                          <div style=\"font-size:14px;font-weight:700\">{{ a.label }}<\u002Fdiv>\n                          <div style=\"font-size:12px;font-weight:500;color:var(--cfa-navy);margin-top:2px\">→ {{ a.metricLabel }}<\u002Fdiv>\n                          <sc-if value=\"{{ a.impactStr }}\"><div style=\"font-size:12px;font-weight:700;color:var(--cfa-green);margin-top:2px\">+{{ a.impactStr }}<\u002Fdiv><\u002Fsc-if>\n                        <\u002Fdiv>\n                        <div style=\"font-size:14px;color:var(--text-secondary);line-height:1.5;white-space:pre-wrap\">{{ a.why }}<\u002Fdiv>\n                      <\u002Fdiv>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                  <sc-if value=\"{{ hasProjection }}\">\n                    <div style=\"background:var(--cfa-cream);border-radius:12px;padding:18px 20px;margin-bottom:26px;display:flex;flex-wrap:wrap;gap:28px\">\n                      <sc-for list=\"{{ projection }}\" as=\"p\" hint-placeholder-count=\"2\">\n                        <div>\n                          <div style=\"font-size:20px;font-weight:700;color:var(--cfa-navy);letter-spacing:-0.02em\">{{ p.totalStr }}<\u002Fdiv>\n                          <div style=\"font-size:12px;color:var(--text-secondary);margin-top:2px\">{{ p.metric }}<\u002Fdiv>\n                          <sc-if value=\"{{ p.hasGoal }}\"><div style=\"font-size:11px;color:var(--text-muted);margin-top:1px\">{{ p.pctStr }}<\u002Fdiv><\u002Fsc-if>\n                        <\u002Fdiv>\n                      <\u002Fsc-for>\n                    <\u002Fdiv>\n                  <\u002Fsc-if>\n                <\u002Fsc-if>\n\n                <div style=\"font-size:11px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--cfa-red);margin-bottom:12px\">Measuring Success<\u002Fdiv>\n                <div style=\"display:flex;flex-direction:column;gap:2px;margin-bottom:14px\">\n                  <sc-for list=\"{{ kpiSummary }}\" as=\"kn\" hint-placeholder-count=\"4\">\n                    <div style=\"display:grid;grid-template-columns:1fr auto;gap:14px;padding:8px 0;border-bottom:1px solid var(--cfa-light-gray);align-items:baseline\">\n                      <span style=\"font-size:14px;font-weight:500;color:var(--text-primary)\">{{ kn.label }}<\u002Fspan>\n                      <span style=\"font-size:14px;font-weight:700;color:var(--cfa-navy)\">{{ kn.target }}<\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n                <div style=\"font-size:14px;color:var(--text-secondary);line-height:1.5;white-space:pre-wrap\">{{ sumKpiNotes }}<\u002Fdiv>\n\n                <sc-if value=\"{{ hasCost }}\">\n                  <div style=\"height:1px;background:var(--cfa-light-gray);margin:26px 0\"><\u002Fdiv>\n                  <div style=\"font-size:11px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--cfa-red);margin-bottom:12px\">Cost to Execute<\u002Fdiv>\n                  <div style=\"display:flex;flex-direction:column;gap:2px;margin-bottom:12px\">\n                    <sc-for list=\"{{ costRows }}\" as=\"c\" hint-placeholder-count=\"2\">\n                      <div style=\"display:grid;grid-template-columns:1fr 120px 100px;gap:12px;padding:8px 0;border-bottom:1px solid var(--cfa-light-gray);font-size:14px;align-items:center\">\n                        <span style=\"color:var(--text-primary)\">{{ c.desc }}<\u002Fspan>\n                        <span style=\"color:var(--text-muted);font-size:12px\">{{ c.category }}<\u002Fspan>\n                        <span style=\"text-align:right;font-weight:700;color:var(--cfa-navy)\">{{ c.cost }}<\u002Fspan>\n                      <\u002Fdiv>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                  <div style=\"display:flex;justify-content:space-between;align-items:center\">\n                    <span style=\"font-size:14px;font-weight:500;color:var(--text-secondary)\">Total budget requested<\u002Fspan>\n                    <span style=\"font-size:22px;font-weight:700;letter-spacing:-0.02em;color:var(--cfa-navy)\">{{ costTotalStr }}<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n\n                <div style=\"height:1px;background:var(--cfa-light-gray);margin:26px 0\"><\u002Fdiv>\n                <div style=\"background:var(--cfa-cream);border-radius:14px;padding:24px\">\n                  <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:18px\">\n                    <div style=\"font-size:11px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--cfa-red)\">Operator Review &amp; Approval<\u002Fdiv>\n                    <span style=\"{{ approvalBadgeStyle }}\">{{ sumApproval }}<\u002Fspan>\n                  <\u002Fdiv>\n                  <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px\">\n                    <x-import component-from-global-scope=\"ChickFilADesignSystem_a0dd25.Input\" label=\"Operator\" value=\"{{ values.operatorName }}\" sc-camel-on-change=\"{{ h.operatorName }}\" placeholder=\"Operator name\" hint-size=\"100%,74px\"><\u002Fx-import>\n                    <x-import component-from-global-scope=\"ChickFilADesignSystem_a0dd25.Select\" label=\"Decision\" value=\"{{ values.approvalStatus }}\" sc-camel-on-change=\"{{ h.approvalStatus }}\" hint-size=\"100%,74px\">\n                      <option value=\"Pending Review\">Pending Review<\u002Foption>\n                      <option value=\"Approved\">Approved<\u002Foption>\n                      <option value=\"Approved with Changes\">Approved with Changes<\u002Foption>\n                      <option value=\"Needs Revision\">Needs Revision<\u002Foption>\n                    <\u002Fx-import>\n                    <x-import component-from-global-scope=\"ChickFilADesignSystem_a0dd25.Input\" label=\"Date\" value=\"{{ values.approvalDate }}\" sc-camel-on-change=\"{{ h.approvalDate }}\" placeholder=\"e.g. Jul 28, 2026\" hint-size=\"100%,74px\"><\u002Fx-import>\n                  <\u002Fdiv>\n                  <div style=\"margin-top:16px\">\n                    <label style=\"font-size:14px;font-weight:500;display:block;margin-bottom:6px\">Operator notes<\u002Flabel>\n                    <textarea class=\"cfa-ta\" rows=\"2\" value=\"{{ values.operatorNotes }}\" sc-camel-on-change=\"{{ h.operatorNotes }}\" placeholder=\"Feedback, conditions of approval, or changes requested…\"><\u002Ftextarea>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n      <\u002Fdiv>\n    <\u002Fmain>\n  <\u002Fdiv>\n\n  <footer class=\"no-print\" style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;padding:16px 28px;background:#fff;border-top:1px solid var(--cfa-light-gray);flex:none\">\n    <div style=\"font-size:13px;color:var(--text-secondary)\">{{ footerHint }}<\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:12px\">\n      <sc-if value=\"{{ canPrev }}\">\n        <x-import component-from-global-scope=\"ChickFilADesignSystem_a0dd25.Button\" variant=\"secondary\" sc-camel-on-click=\"{{ prev }}\" hint-size=\"auto,44px\">Back<\u002Fx-import>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ notLast }}\">\n        <x-import component-from-global-scope=\"ChickFilADesignSystem_a0dd25.Button\" variant=\"primary\" sc-camel-on-click=\"{{ next }}\" hint-size=\"auto,44px\">{{ nextLabel }}<\u002Fx-import>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ isLast }}\">\n        <x-import component-from-global-scope=\"ChickFilADesignSystem_a0dd25.Button\" variant=\"primary\" sc-camel-on-click=\"{{ onPrint }}\" hint-size=\"auto,44px\">Print / Save Plan<\u002Fx-import>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nconst STEP_LABELS = [\"Welcome\",\"Goals & Targets\",\"Look Back\",\"Monthly Theme\",\"Promotions\",\"Tactics\",\"Team Contest\",\"Cost to Execute\",\"Weekly Goals Tracking\",\"Your Plan\"];\nconst REWARDS = [\"Gift card\",\"Cash bonus\",\"Free meals for a week\",\"Extra paid time off\",\"Preferred parking spot\",\"Team outing / party\",\"Movie tickets\",\"Gas card\",\"CFA swag & merch\",\"Public shout-out\",\"Early-out privilege\",\"Catering for their family\"];\nconst COST_CATS = [\"Signage\",\"Event\",\"Activity\",\"Supplies\",\"Reward\",\"Other\"];\n// ── Deployment config ─────────────────────────────────────────\n// formEndpoint: paste a Formspree (or Basin) form URL to email the Operator on submit.\n// Leave \"\" to fall back to opening the Operator's email pre-filled with the plan.\nconst CONFIG = {\n  sheetsEndpoint: \"https://script.google.com/macros/s/AKfycby2xO-JK94pBQ6lDk3H9u7sK0SDvPycw-t5aPKMTySac5EnegCuO3_K4VSXoO954qMK/exec\",\n  formEndpoint: \"\",\n  operatorEmail: \"alan.thompson@cfafttotten.com\",\n  googleClientId: \"104013836956-nqu6186h1r7u5jgk93om13okmgkjefjl.apps.googleusercontent.com\",\n  allowedDomain: \"cfafttotten.com\"\n};\nconst SAVE_KEY = \"cfa-mktg-plan-fttotten\";\n\nconst CHANNELS = [\n  {key:\"signage\", name:\"Signage & POP\", hint:\"What guests see the moment they walk in or pull up.\", tactics:[\"Menu-board LTO callouts\",\"Window clings & door decals\",\"Register-topper cards\",\"Drive-thru menu highlights\",\"Dining-room table tents\",\"Drive Thru Signage\",\"Building Signage\",\"In-Store Signage\",\"Marquee Messaging\"]},\n  {key:\"app\", name:\"Chick-fil-A One® App & Mobile Offers\", hint:\"Reach guests who already love us, right in their pocket.\", tactics:[\"Featured mobile-only offer\",\"Bonus points\",\"Free item with mobile order\",\"App-exclusive bundle\",\"Reorder reminder push\",\"New-member welcome reward\"]},\n  {key:\"social\", name:\"Local Social (Instagram / Facebook)\", hint:\"Show the personality of your restaurant and team.\", tactics:[\"Team Member spotlight\",\"Behind-the-counter reel\",\"LTO announcement post\",\"Guest photo re-share\",\"Local event countdown\",\"Giveaway / tag-a-friend\"]},\n  {key:\"email\", name:\"Spotlight Email to Guests\", hint:\"Direct, timely notes to guests who've opted in.\", tactics:[\"Monthly theme announcement\",\"Limited-time offer alert\",\"Catering reminder\",\"Birthday reward note\",\"Community event invite\"]},\n  {key:\"events\", name:\"In-Store Events\", hint:\"Turn the restaurant into a gathering place that brings families and neighbors together.\", tactics:[\"Family Night\",\"Daddy Daughter Date Night\",\"Mommy & Me Morning\",\"Story Time with the Cow\",\"Kids' Craft & Cookie Night\",\"Spirit Night with a local team\",\"Grandparents' Breakfast\",\"Teacher Appreciation Night\",\"First Responders Family Night\",\"Back-to-School Bash\",\"Community Game Night (board games & trivia)\",\"Character / holiday breakfast\",\"Little Farmers Day (meet the ingredients)\",\"Neighborhood Block Party\"]},\n  {key:\"community\", name:\"Community Events & Sponsorships\", hint:\"Be a good neighbor and show up where guests gather.\", tactics:[\"Spirit night with a school\",\"Local 5K or fair booth\",\"First-responder appreciation\",\"Youth-sports sponsorship\",\"Cow mascot appearance\"]},\n  {key:\"catering\", name:\"Catering Outreach (B2B)\", hint:\"Grow large orders from offices, schools, and teams.\", tactics:[\"Office drop-off sampling\",\"Intro email to local businesses\",\"Lunch-and-learn sponsorship\",\"School faculty catering offer\",\"Repeat-client thank-you\"]},\n  {key:\"partners\", name:\"Local Partnerships\", hint:\"Team up with schools, offices, and neighbors nearby.\", tactics:[\"School reading-reward program\",\"Nearby office perk partnership\",\"Gym / studio cross-promo\",\"Community group nights\",\"Chamber of Commerce feature\"]},\n  {key:\"ops\", name:\"Drive-Thru & Operations\", hint:\"Speed and warmth are marketing, too.\", tactics:[\"Second-mile service push\",\"Drive-thru speed goal\",\"Mobile-order pickup lane\",\"Sampling in the drive-thru\",\"Remarkable moment of the week\"]}\n];\n\nconst ANNUAL_GOAL = 10000000;\nconst YTD_SALES = 4562031;\nconst MONTH_NAMES = [\"january\",\"february\",\"march\",\"april\",\"may\",\"june\",\"july\",\"august\",\"september\",\"october\",\"november\",\"december\"];\n\nconst REF_META = [\n  {metric:\"Monthly sales\", goal:\"$833,000\"},\n  {metric:\"Avg Daily Transactions\", goal:\"2,000\"},\n  {metric:\"Check Avg\", goal:\"$18.00\"},\n  {metric:\"Avg Daily Mobile Sales Transactions\", goal:\"\"},\n  {metric:\"Monthly Catering Sales\", goal:\"$30,000\"}\n];\n\nconst KPIS = [\"Total sales vs. goal\",\"Daily transaction count\",\"Average check\",\"Mobile-order sales %\",\"Catering sales\",\"New Chick-fil-A One® members\",\"Guest (CEM) score\",\"Drive-thru speed\"];\n\nconst chipBase = {fontFamily:\"var(--font-sans)\",fontSize:\"14px\",fontWeight:500,padding:\"10px 16px\",borderRadius:\"999px\",cursor:\"pointer\",lineHeight:1.1,textAlign:\"left\",transition:\"background .15s, border-color .15s, color .15s\"};\nconst CHIP_OFF = {...chipBase, background:\"#fff\", color:\"var(--text-primary)\", border:\"2px solid var(--cfa-gray)\"};\nconst CHIP_ON = {...chipBase, background:\"var(--cfa-red)\", color:\"#fff\", border:\"2px solid var(--cfa-red)\"};\nconst KPI_ON = {...chipBase, background:\"var(--cfa-navy)\", color:\"#fff\", border:\"2px solid var(--cfa-navy)\"};\n\nclass Component extends DCLogic {\n  state = {\n    step: 0,\n    month: \"August 2026\",\n    preparedBy: \"\",\n    objective: \"\",\n    salesGoal: \"1080000\",\n    avgCheck: \"18.00\",\n    daysOpen: \"26\",\n    mobilePct: \"40\",\n    lastWin: \"\",\n    repeat: \"\",\n    lookbackNote: \"\",\n    theme: \"\",\n    themeWhy: \"\",\n    promos: \"\",\n    bundles: \"\",\n    tactics: {},\n    kpis: {\"0\":true,\"1\":true,\"3\":true},\n    kpiTargets: {},\n    kpiNotes: \"\",\n    annualGoal: \"$10,000,000\",\n    refLast: [\"$811,115\",\"1,865\",\"$16.73\",\"584\",\"$17,678\"],\n    refYear: [\"$4,562,031\",\"1,770\",\"$16.63\",\"570\",\"$19,265\"],\n    customTactics: {},\n    customDraft: {},\n    align: {},\n    contests: [{name:\"\", focus:\"\", dates:\"\", rewards:{}, customRewards:[], rewardDraft:\"\"}],\n    costItems: [],\n    operatorName: \"\",\n    approvalStatus: \"Pending Review\",\n    approvalDate: \"\",\n    operatorNotes: \"\",\n    authed: false,\n    authError: \"\",\n    userEmail: \"\"\n  };\n\n  initGoogle(){\n    const start = () => {\n      if(!(window.google && google.accounts && google.accounts.id)) return;\n      google.accounts.id.initialize({ client_id: CONFIG.googleClientId, callback: (resp) => this.handleCredential(resp) });\n      const el = document.getElementById(\"g-signin\");\n      if(el) google.accounts.id.renderButton(el, {theme:\"filled_blue\", size:\"large\", shape:\"pill\", text:\"signin_with\"});\n    };\n    if(window.google && window.google.accounts){ start(); return; }\n    const existing = document.getElementById(\"gis-script\");\n    if(existing){ existing.addEventListener(\"load\", start); return; }\n    const sc = document.createElement(\"script\");\n    sc.src = \"https://accounts.google.com/gsi/client\"; sc.async = true; sc.defer = true; sc.id = \"gis-script\";\n    sc.onload = start;\n    document.head.appendChild(sc);\n  }\n  handleCredential(resp){\n    try {\n      const b = resp.credential.split(\".\")[1].replace(/-/g, \"+\").replace(/_/g, \"/\");\n      const payload = JSON.parse(decodeURIComponent(atob(b).split(\"\").map(c => \"%\" + (\"00\" + c.charCodeAt(0).toString(16)).slice(-2)).join(\"\")));\n      const email = (payload.email || \"\").toLowerCase();\n      const dom = CONFIG.allowedDomain ? CONFIG.allowedDomain.toLowerCase() : \"\";\n      if(dom && !email.endsWith(\"@\" + dom)){ this.setState({authError: `Please sign in with your @${dom} account.`}); return; }\n      this.setState({authed: true, authError: \"\", userEmail: email});\n    } catch(e){ this.setState({authError: \"Sign-in failed. Please try again.\"}); }\n  }\n\n  setContestField(i, f, v){ this.setState(s => { const arr = (s.contests || []).slice(); arr[i] = {...arr[i], [f]: v}; return {contests: arr}; }); }\n  addContest(){ this.setState(s => ({contests: [...(s.contests || []), {name:\"\", focus:\"\", dates:\"\", rewards:{}, customRewards:[], rewardDraft:\"\"}]})); }\n  removeContest(i){ this.setState(s => { const arr = (s.contests || []).slice(); arr.splice(i, 1); return {contests: arr.length ? arr : [{name:\"\", focus:\"\", dates:\"\", rewards:{}, customRewards:[], rewardDraft:\"\"}]}; }); }\n  toggleContestReward(i, id){ this.setState(s => { const arr = (s.contests || []).slice(); const c = {...arr[i]}; c.rewards = {...c.rewards, [id]: !(c.rewards && c.rewards[id])}; arr[i] = c; return {contests: arr}; }); }\n  addContestReward(i){ this.setState(s => { const arr = (s.contests || []).slice(); const c = {...arr[i]}; const d = ((c.rewardDraft) || \"\").trim(); if(!d) return {}; const list = ((c.customRewards) || []).slice(); const id = \"rc\" + list.length; list.push(d); c.customRewards = list; c.rewardDraft = \"\"; c.rewards = {...c.rewards, [id]: true}; arr[i] = c; return {contests: arr}; }); }\n  addCost(){ this.setState(s => ({costItems: [...(s.costItems || []), {desc:\"\", category:\"\", cost:\"\"}]})); }\n  setCost(i, f, v){ this.setState(s => { const arr = (s.costItems || []).slice(); arr[i] = {...arr[i], [f]: v}; return {costItems: arr}; }); }\n  removeCost(i){ this.setState(s => { const arr = (s.costItems || []).slice(); arr.splice(i, 1); return {costItems: arr}; }); }\n\n  setDraft(key, v){ this.setState(s => ({customDraft: {...s.customDraft, [key]: v}})); }\n  addCustom(key){\n    this.setState(s => {\n      const draft = ((s.customDraft || {})[key] || \"\").trim();\n      if(!draft) return {};\n      const list = ((s.customTactics || {})[key] || []).slice();\n      const id = key + \":c\" + list.length;\n      list.push(draft);\n      return {\n        customTactics: {...s.customTactics, [key]: list},\n        customDraft: {...s.customDraft, [key]: \"\"},\n        tactics: {...s.tactics, [id]: true}\n      };\n    });\n  }\n  setAlign(id, field, v){ this.setState(s => ({align: {...s.align, [id]: {...((s.align||{})[id]), [field]: v}}})); }\n\n  setRef(kind, i, v){ this.setState(s => { const arr = s[kind].slice(); arr[i] = v; return {[kind]: arr}; }); }\n\n  setField(k, v){ this.setState({[k]: v}); }\n  toggleTactic(id){ this.setState(s => ({tactics: {...s.tactics, [id]: !s.tactics[id]}})); }\n  toggleKpi(i){ this.setState(s => ({kpis: {...s.kpis, [i]: !s.kpis[i]}})); }\n  setKpiTarget(i, v){ this.setState(s => ({kpiTargets: {...s.kpiTargets, [i]: v}})); }\n  go(i){ this.setState({step: Math.max(0, Math.min(9, i))}); this.scrollTop(); }\n\n  componentDidMount(){\n    try {\n      const raw = window.localStorage.getItem(SAVE_KEY);\n      if(raw){ const saved = JSON.parse(raw); if(saved && typeof saved === \"object\"){ this.setState({...saved, submitStatus: \"\", authed: false}); } }\n    } catch(e){}\n    if(CONFIG.googleClientId){ this.initGoogle(); }\n  }\n  componentDidUpdate(){\n    try { window.localStorage.setItem(SAVE_KEY, JSON.stringify({...this.state, submitStatus: \"\", authed: false, authError: \"\", userEmail: \"\"})); } catch(e){}\n  }\n\n  buildPlanText(){\n    const s = this.state;\n    const L = [];\n    L.push(`MONTHLY MARKETING PLAN — ${s.month || \"\"}`);\n    L.push(`Prepared by: ${s.preparedBy || \"—\"}`);\n    L.push(`Objective: ${s.objective || \"—\"}`);\n    L.push(\"\");\n    L.push(`Theme: ${s.theme || \"—\"}`);\n    L.push(`Promotions: ${s.promos || \"—\"}`);\n    L.push(`Bundles: ${s.bundles || \"—\"}`);\n    L.push(\"\");\n    const tsel = [];\n    CHANNELS.forEach(c => {\n      c.tactics.forEach((t, i) => { if(s.tactics[c.key + \":\" + i]) tsel.push(t); });\n      ((s.customTactics || {})[c.key] || []).forEach((t, i) => { if(s.tactics[c.key + \":c\" + i]) tsel.push(t); });\n    });\n    L.push(`Tactics: ${tsel.join(\", \") || \"—\"}`);\n    L.push(\"\");\n    L.push(\"Team contests:\");\n    (s.contests || []).forEach((ct, ci) => {\n      const rewardAll = REWARDS.map((t, i) => ({id:\"r\"+i, label:t})).concat((ct.customRewards || []).map((t, i) => ({id:\"rc\"+i, label:t})));\n      const rsel = rewardAll.filter(t => ct.rewards && ct.rewards[t.id]).map(t => t.label);\n      L.push(`  ${ci + 1}. ${ct.name || \"(unnamed)\"} (${ct.dates || \"dates TBD\"}) — ${ct.focus || \"\"}`);\n      L.push(`     Rewards: ${rsel.join(\", \") || \"—\"}`);\n    });\n    L.push(\"\");\n    const total = (s.costItems || []).reduce((a, it) => { const n = parseFloat(String(it.cost).replace(/[^0-9.]/g, \"\")); return a + (isNaN(n) ? 0 : n); }, 0);\n    L.push(`Total cost to execute: $${Math.round(total).toLocaleString(\"en-US\")}`);\n    L.push(\"\");\n    L.push(\"Success metrics:\");\n    KPIS.forEach((k, i) => { if(s.kpis[i]) L.push(`  - ${k}: ${((s.kpiTargets || {})[i]) || \"target TBD\"}`); });\n    L.push(\"\");\n    L.push(\"Please review and approve in the plan tool.\");\n    return L.join(\"\\n\");\n  }\n\n  submitForReview(){\n    const s = this.state;\n    const text = this.buildPlanText();\n    const subject = `Marketing Plan for ${s.month || \"review\"} — ${s.preparedBy || \"Marketing Lead\"}`;\n    const ep = CONFIG.sheetsEndpoint || CONFIG.formEndpoint;\n    if(ep){\n      this.setState({submitStatus: \"sending\"});\n      fetch(ep, {\n        method: \"POST\",\n        headers: {\"Content-Type\": \"text/plain;charset=utf-8\"},\n        body: JSON.stringify({subject, month: s.month, preparedBy: s.preparedBy, plan: text, data: s})\n      }).then(r => this.setState(r.ok ? {submitStatus: \"sent\", submittedAt: new Date().toLocaleString()} : {submitStatus: \"error\"}))\n        .catch(() => this.setState({submitStatus: \"error\"}));\n    } else {\n      window.location.href = `mailto:${CONFIG.operatorEmail}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(text)}`;\n      this.setState({submitStatus: \"mailto\", submittedAt: new Date().toLocaleString()});\n    }\n  }\n  scrollTop(){ const el = this.base && this.base.querySelector(\".app-content\"); if(el) el.scrollTop = 0; }\n\n  num(v){ const n = parseFloat(String(v).replace(/[^0-9.]/g,\"\")); return isNaN(n) ? NaN : n; }\n  fInt(n){ return (!isFinite(n)||isNaN(n)) ? \"—\" : Math.round(n).toLocaleString(\"en-US\"); }\n  fUSD(n){ return (!isFinite(n)||isNaN(n)) ? \"—\" : \"$\" + Math.round(n).toLocaleString(\"en-US\"); }\n\n  renderVals(){\n    const s = this.state;\n    const fields = [\"month\",\"preparedBy\",\"objective\",\"annualGoal\",\"avgCheck\",\"daysOpen\",\"mobilePct\",\"lastWin\",\"repeat\",\"lookbackNote\",\"theme\",\"themeWhy\",\"promos\",\"bundles\",\"kpiNotes\",\"contestName\",\"contestFocus\",\"contestDates\",\"operatorName\",\"approvalStatus\",\"approvalDate\",\"operatorNotes\"];\n    const h = {};\n    fields.forEach(k => { h[k] = (e) => this.setField(k, e.target.value); });\n\n    // auto sales goal — what it takes to hit the annual goal over the remaining months\n    const ml = String(s.month || \"\").toLowerCase();\n    let mIdx = MONTH_NAMES.findIndex(m => ml.indexOf(m) !== -1);\n    if (mIdx === -1) mIdx = new Date().getMonth();\n    const remainingMonths = Math.max(1, 12 - mIdx);\n    const annualGoalNum = (() => { const n = this.num(s.annualGoal); return isNaN(n) ? ANNUAL_GOAL : n; })();\n    const ytdSales = this.num(s.refYear && s.refYear[0]);\n    const remainingNeeded = Math.max(0, annualGoalNum - (isNaN(ytdSales) ? YTD_SALES : ytdSales));\n    const suggestedMonthly = remainingNeeded / remainingMonths;\n    const goalTxDay = suggestedMonthly / 18 / this.num(s.daysOpen);\n\n    // math\n    const sales = suggestedMonthly, avg = this.num(s.avgCheck), days = this.num(s.daysOpen), pct = this.num(s.mobilePct);\n    const txMonth = sales / avg;\n    const txDay = txMonth / days;\n    const mobileSales = sales * (pct/100);\n    const mobileTx = mobileSales / avg;\n    const dailySales = sales / days, dailyMobile = mobileSales / days, mobileTxDay = mobileTx / days;\n    const goalMobileTxDay = goalTxDay * (pct / 100);\n    const coach = (isFinite(dailySales) && isFinite(txDay))\n      ? `To reach ${this.fUSD(sales)} this month, your team needs about ${this.fUSD(dailySales)} in sales each day — that's roughly ${this.fInt(txDay)} guests a day at a ${this.fUSD(avg)} check average. Broken down like that, it's one welcome, one order, one guest at a time. Hit the daily number and the month takes care of itself.`\n      : \"Fill in your check average and days open above and we'll turn your goal into a daily target your team can feel.\";\n\n    const reference = REF_META.map((m, i) => ({\n      metric: m.metric, goal: i === 0 ? this.fUSD(suggestedMonthly) : i === 1 ? this.fInt(goalTxDay) : i === 3 ? this.fInt(goalMobileTxDay) : m.goal,\n      last: s.refLast[i] || \"\", year: s.refYear[i] || \"\",\n      onLast: (e) => this.setRef(\"refLast\", i, e.target.value),\n      onYear: (e) => this.setRef(\"refYear\", i, e.target.value)\n    }));\n\n    // steps rail\n    const steps = STEP_LABELS.map((label, i) => {\n      const active = i === s.step, done = i < s.step;\n      return {\n        label,\n        onClick: () => this.go(i),\n        circleText: done ? \"✓\" : String(i+1),\n        rowStyle: {display:\"flex\",alignItems:\"center\",gap:\"12px\",width:\"100%\",textAlign:\"left\",padding:\"10px 12px\",borderRadius:\"10px\",border:\"none\",cursor:\"pointer\",marginBottom:\"2px\",background: active ? \"rgba(221,0,51,.08)\" : \"transparent\",transition:\"background .15s\"},\n        circleStyle: {flex:\"none\",width:\"26px\",height:\"26px\",borderRadius:\"999px\",display:\"flex\",alignItems:\"center\",justifyContent:\"center\",fontSize:\"13px\",fontWeight:700,background: active ? \"var(--cfa-red)\" : done ? \"var(--cfa-green)\" : \"var(--cfa-light-gray)\",color: (active||done) ? \"#fff\" : \"var(--text-muted)\"},\n        labelStyle: {fontSize:\"14.5px\",fontWeight: active ? 700 : 500,color: active ? \"var(--cfa-red)\" : \"var(--text-primary)\"}\n      };\n    });\n\n    // tactics\n    const customT = s.customTactics || {};\n    const channels = CHANNELS.map(c => {\n      const all = c.tactics.map((t, i) => ({id: c.key + \":\" + i, label: t}))\n        .concat((customT[c.key] || []).map((t, i) => ({id: c.key + \":c\" + i, label: t})));\n      return {\n        name: c.name, hint: c.hint, _all: all, key: c.key,\n        chips: all.map(t => ({ label: t.label, toggle: () => this.toggleTactic(t.id), style: s.tactics[t.id] ? CHIP_ON : CHIP_OFF })),\n        draft: (s.customDraft && s.customDraft[c.key]) || \"\",\n        onDraft: (e) => this.setDraft(c.key, e.target.value),\n        onAdd: () => this.addCustom(c.key),\n        onKey: (e) => { if(e.key === \"Enter\"){ e.preventDefault(); this.addCustom(c.key); } }\n      };\n    });\n\n    const selectedTactics = [];\n    channels.forEach(ch => ch._all.forEach(t => { if(s.tactics[t.id]) selectedTactics.push({id: t.id, label: t.label, channel: ch.name}); }));\n    const impactMeta = (m) => {\n      switch(m){\n        case \"Monthly sales\": return {label:\"Sales it will add ($)\", kind:\"$\", ph:\"e.g. 12000\"};\n        case \"Transactions per day\": return {label:\"Extra transactions per day\", kind:\"int\", ph:\"e.g. 25\"};\n        case \"Check average\": return {label:\"Check-average lift ($)\", kind:\"$\", ph:\"e.g. 0.40\"};\n        case \"Mobile sales transactions\": return {label:\"Extra mobile transactions / day\", kind:\"int\", ph:\"e.g. 15\"};\n        case \"Catering sales\": return {label:\"Catering sales it will add ($)\", kind:\"$\", ph:\"e.g. 3000\"};\n        case \"New Chick-fil-A One® members\": return {label:\"New members it will add\", kind:\"int\", ph:\"e.g. 60\"};\n        case \"Guest (CEM) score\": return {label:\"CEM point lift\", kind:\"num\", ph:\"e.g. 2\"};\n        default: return {label:\"Estimated impact this month\", kind:\"num\", ph:\"Pick a goal first\"};\n      }\n    };\n    const alignRows = selectedTactics.map(t => {\n      const a = (s.align && s.align[t.id]) || {};\n      const im = impactMeta(a.metric);\n      const iv = this.num(a.impact);\n      const impactStr = isNaN(iv) ? \"\" : (im.kind === \"$\" ? this.fUSD(iv) : this.fInt(iv));\n      return {\n        id: t.id, label: t.label, channel: t.channel,\n        metric: a.metric || \"\", metricLabel: a.metric || \"Not yet linked\", why: a.why || \"\",\n        impact: a.impact || \"\", impactLabel: im.label, impactPh: im.ph, impactStr,\n        onMetric: (e) => this.setAlign(t.id, \"metric\", e.target.value),\n        onWhy: (e) => this.setAlign(t.id, \"why\", e.target.value),\n        onImpact: (e) => this.setAlign(t.id, \"impact\", e.target.value)\n      };\n    });\n    const impactTotals = {};\n    alignRows.forEach(a => { const n = this.num(a.impact); if(a.metric && !isNaN(n)) impactTotals[a.metric] = (impactTotals[a.metric] || 0) + n; });\n    const PROJ_GOALS = {\"Monthly sales\": suggestedMonthly, \"Transactions per day\": goalTxDay, \"Catering sales\": 30000, \"Mobile sales transactions\": goalMobileTxDay};\n    const projection = Object.keys(impactTotals).map(m => {\n      const meta = impactMeta(m); const total = impactTotals[m];\n      const fmt = (v) => meta.kind === \"$\" ? this.fUSD(v) : this.fInt(v);\n      const goal = PROJ_GOALS[m];\n      const pct = (goal && isFinite(goal) && goal > 0) ? Math.round(total / goal * 100) : null;\n      return { metric: m, totalStr: fmt(total), goalStr: goal != null ? fmt(goal) : \"\", hasGoal: goal != null, pctStr: pct != null ? (pct + \"% of goal\") : \"\" };\n    });\n\n    const kpis = KPIS.map((label, i) => ({\n      label, toggle: () => this.toggleKpi(i), style: s.kpis[i] ? KPI_ON : CHIP_OFF\n    }));\n\n    // team contests (one or more)\n    const contests = s.contests || [];\n    const contestBlocks = contests.map((ct, ci) => {\n      const rewardAll = REWARDS.map((t, i) => ({id: \"r\" + i, label: t})).concat((ct.customRewards || []).map((t, i) => ({id: \"rc\" + i, label: t})));\n      return {\n        ci, title: \"Contest \" + (ci + 1),\n        name: ct.name || \"\", focus: ct.focus || \"\", dates: ct.dates || \"\",\n        onName: (e) => this.setContestField(ci, \"name\", e.target.value),\n        onFocus: (e) => this.setContestField(ci, \"focus\", e.target.value),\n        onDates: (e) => this.setContestField(ci, \"dates\", e.target.value),\n        canRemove: contests.length > 1, onRemove: () => this.removeContest(ci),\n        rewardChips: rewardAll.map(t => ({ label: t.label, toggle: () => this.toggleContestReward(ci, t.id), style: (ct.rewards && ct.rewards[t.id]) ? CHIP_ON : CHIP_OFF })),\n        rewardDraft: ct.rewardDraft || \"\",\n        onRewardDraft: (e) => this.setContestField(ci, \"rewardDraft\", e.target.value),\n        onRewardAdd: () => this.addContestReward(ci),\n        onRewardKey: (e) => { if(e.key === \"Enter\"){ e.preventDefault(); this.addContestReward(ci); } }\n      };\n    });\n    const contestSummary = contests.map((ct, ci) => {\n      const rewardAll = REWARDS.map((t, i) => ({id: \"r\" + i, label: t})).concat((ct.customRewards || []).map((t, i) => ({id: \"rc\" + i, label: t})));\n      return {\n        name: (ct.name && ct.name.trim()) ? ct.name : (\"Contest \" + (ci + 1)),\n        dates: ct.dates || \"\", focus: ct.focus || \"\",\n        rewards: rewardAll.filter(t => ct.rewards && ct.rewards[t.id]).map(t => t.label),\n        hasRewards: rewardAll.some(t => ct.rewards && ct.rewards[t.id])\n      };\n    });\n    const hasContests = contests.some(ct => (ct.name && ct.name.trim()) || (ct.focus && ct.focus.trim()));\n\n    // cost to execute\n    const costItems = s.costItems || [];\n    let costTotal = 0;\n    const costRows = costItems.map((it, i) => {\n      const n = this.num(it.cost); if(!isNaN(n)) costTotal += n;\n      return {\n        desc: it.desc || \"\", category: it.category || \"\", cost: it.cost || \"\",\n        onDesc: (e) => this.setCost(i, \"desc\", e.target.value),\n        onCat: (e) => this.setCost(i, \"category\", e.target.value),\n        onCost: (e) => this.setCost(i, \"cost\", e.target.value),\n        onRemove: () => this.removeCost(i)\n      };\n    });\n\n    // summary\n    const selectedByChannel = channels.map(ch => ({\n      name: ch.name,\n      items: ch._all.filter(t => s.tactics[t.id]).map(t => t.label)\n    })).filter(g => g.items.length);\n    const hasTactics = selectedByChannel.length > 0;\n    const selectedKpis = KPIS.filter((_,i) => s.kpis[i]);\n    const kpiGoalRows = KPIS.map((label, i) => ({ i, label, selected: !!s.kpis[i], target: (s.kpiTargets && s.kpiTargets[i]) || \"\", onTarget: (e) => this.setKpiTarget(i, e.target.value) })).filter(r => r.selected);\n    const kpiSummary = kpiGoalRows.map(r => ({ label: r.label, target: r.target && String(r.target).trim() ? r.target : \"Set a target\" }));\n\n    const dash = (v, fb) => (v && String(v).trim()) ? v : fb;\n    const ss = s.submitStatus || \"\";\n    const submitMsg = ss === \"sending\" ? \"Sending to the Operator…\"\n      : ss === \"sent\" ? `Sent for review ✓ ${s.submittedAt || \"\"}`\n      : ss === \"mailto\" ? \"Your email app opened with the plan — send it to notify the Operator.\"\n      : ss === \"error\" ? \"Couldn't send automatically — try again, or use Print / Save Plan and email it.\"\n      : \"\";\n    const st = s.approvalStatus || \"Pending Review\";\n    const stColor = st === \"Approved\" ? \"var(--cfa-green)\" : st === \"Needs Revision\" ? \"var(--cfa-red)\" : st === \"Approved with Changes\" ? \"var(--cfa-yellow)\" : \"var(--cfa-dark-gray)\";\n\n    return {\n      stepNum: s.step + 1, stepCount: 10,\n      isS0: s.step===0, isS1: s.step===1, isS2: s.step===2, isS3: s.step===3, isS4: s.step===4,\n      isS5: s.step===5, isS6: s.step===6, isS7: s.step===7, isS8: s.step===8, isS9: s.step===9,\n      steps,\n      reference,\n      values: s,\n      h,\n      autoSalesStr: this.fUSD(suggestedMonthly),\n      autoSalesDeriv: `${this.fUSD(remainingNeeded)} left toward the ${this.fUSD(annualGoalNum)} annual goal, spread across ${remainingMonths} month${remainingMonths===1?\"\":\"s\"} remaining.`,\n      txMonthStr: this.fInt(txMonth), txPerDayStr: this.fInt(txDay),\n      dailySalesStr: this.fUSD(dailySales), dailyMobileStr: this.fUSD(dailyMobile), mobileTxPerDayStr: this.fInt(mobileTxDay),\n      mobileSalesStr: this.fUSD(mobileSales), mobileTxStr: this.fInt(mobileTx),\n      coach,\n      channels, kpis,\n      alignRows, hasSelected: selectedTactics.length > 0, noSelected: selectedTactics.length === 0,\n      alignSummary: alignRows.filter(a => a.metric || (a.why && a.why.trim()) || a.impact), hasAlign: alignRows.some(a => a.metric || (a.why && a.why.trim()) || a.impact),\n      projection, hasProjection: projection.length > 0,\n      contestBlocks, onAddContest: () => this.addContest(), contestSummary, hasContests,\n      costRows, hasCost: costItems.length > 0, costTotalStr: this.fUSD(costTotal), onCostAdd: () => this.addCost(),\n      // nav\n      prev: () => this.go(s.step - 1),\n      next: () => this.go(s.step + 1),\n      canPrev: s.step > 0,\n      isLast: s.step === 9,\n      notLast: s.step < 9,\n      nextLabel: s.step === 8 ? \"See My Plan\" : \"Next\",\n      onPrint: () => window.print(),\n      footerHint: s.step === 9 ? \"Your plan is ready — print it or save it as a PDF to share with your team.\" : \"Your progress is saved as you go.\",\n      // summary\n      sumMonth: dash(s.month, \"This Month\"),\n      sumObjective: dash(s.objective, \"A month of second-mile service and steady growth.\"),\n      sumPreparedBy: dash(s.preparedBy, \"your marketing lead\"),\n      sumSales: this.fUSD(sales),\n      sumAvg: this.fUSD(avg),\n      sumTheme: dash(s.theme, \"Add a theme in Step 4\"),\n      sumThemeWhy: dash(s.themeWhy, \"—\"),\n      sumLastWin: dash(s.lastWin, \"—\"),\n      sumPromos: dash(s.promos, \"—\"),\n      sumBundles: dash(s.bundles, \"\"),\n      sumKpiNotes: dash(s.kpiNotes, \"\"),\n      sumOperator: dash(s.operatorName, \"—\"),\n      sumApproval: st,\n      sumApprovalDate: dash(s.approvalDate, \"—\"),\n      sumApprovalNotes: dash(s.operatorNotes, \"\"),\n      approvalBadgeStyle: {display:\"inline-block\", background: stColor, color:\"#fff\", fontSize:\"13px\", fontWeight:500, padding:\"6px 16px\", borderRadius:\"999px\"},\n      hasTactics, noTactics: !hasTactics,\n      selectedByChannel, selectedKpis, kpiGoalRows, hasKpiGoals: kpiGoalRows.length > 0, kpiSummary,\n      onSubmit: () => this.submitForReview(), submitMsg, submitting: ss === \"sending\",\n      showGate: !!CONFIG.googleClientId && !s.authed, showApp: !CONFIG.googleClientId || !!s.authed, authError: s.authError || \"\"\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
